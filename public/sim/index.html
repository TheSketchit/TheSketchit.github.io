            }
            if (this.type === "TAVERN") {
              const bSp = SpriteCache.get("🍻", 28, false, false);
              ctx.drawImage(
                bSp.img,
                this.pos.x - bSp.ox,
                this.pos.y + 10 - bSp.oy,
              );
            }
            if (conf.isGuild) {
              if (this.heroes.length < this.maxHeroes) {
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = "bold 16px Arial";
                ctx.fillStyle = "#ecc94b";
                ctx.strokeStyle = "black";
                ctx.lineWidth = 3;
                const text = `${this.heroes.length}/${this.maxHeroes}`;
                ctx.strokeText(text, this.pos.x, this.pos.y - 55);
                ctx.fillText(text, this.pos.x, this.pos.y - 55);
              }
              if (this.heroes.some((h) => h.isDead)) {
                const pY = Math.sin(Game.timeMs * 0.008) * 5;
                const pSp = SpriteCache.get("🙏", 28, false, false);
                ctx.drawImage(
                  pSp.img,
                  this.pos.x - pSp.ox,
                  this.pos.y - 75 + pY - pSp.oy,
                );
              }
            }
          }

          if (this.fireTimer > 0) {
            const bounce = Math.abs(Math.sin(Game.timeMs * 0.01)) * 15;
            const fSp = SpriteCache.get("🔥", 40, false, false);
            ctx.drawImage(
              fSp.img,
              this.pos.x - fSp.ox,
              this.pos.y - this.radius - 15 - bounce - fSp.oy,
            );
          }

          if (this.isRepairing && this.hp < this.maxHp) {
            const hoverY = Math.abs(Math.sin(Game.timeMs * 0.01)) * 8;
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.beginPath();
            ctx.ellipse(
              this.pos.x + 15,
              this.pos.y - 30,
              10,
              4,
              0,
              0,
              Math.PI * 2,
            );
            ctx.fill();
            const rSp = SpriteCache.get("🛠️", 24, false, false);
            ctx.drawImage(
              rSp.img,
              this.pos.x + 15 - rSp.ox,
              this.pos.y - 30 - hoverY - rSp.oy,
            );
          }

          let hpOff = -this.radius - 5;
          if (this.type === "TOWER") hpOff -= 25;
          else if (conf && conf.isGuild) hpOff -= 15;
          let hH = [];
          for (let i = 0; i < Game.activeHeroes.length; i++) {
            if (Game.activeHeroes[i].isHealingAt === this)
              hH.push(Game.activeHeroes[i]);
          }
          if (hH.length > 0) {
            const hY = Math.sin(Game.timeMs * 0.005) * 5;
            hH.forEach((h, i) => {
              const e =
                h.classType === "WARRIOR"
                  ? "🧌"
                  : h.classType === "ROGUE"
                    ? "🥷"
                    : "🧚";
              const off = (i - (hH.length - 1) / 2) * 30,
                bX = this.pos.x + off,
                bY = this.pos.y + hpOff - 25 + hY;
              const hSp = SpriteCache.get(e, 24);
              ctx.drawImage(hSp.img, bX - hSp.ox, bY - hSp.oy);
              const bSp = SpriteCache.get("🩹", 14, false, false);
              ctx.drawImage(bSp.img, bX + 12 - bSp.ox, bY - 5 - bSp.oy);
            });
          }
          this.drawHP(ctx, hpOff);
        }
        die() {
          super.die();
          if (this.type === "CASTLE") {
            Game.gameOver = true;
            Game.showStatsScreen(true);
          } else {
            Game.buildingDeaths++;
          }
        }
      }

      class Flag extends Entity {
        constructor(x, y, t, tE = null, sourceTav = null) {
          super(x, y);
          this.isStatic = true;
          this.type = t;
          this.bounty =
            t === "FLAG_EXPLORE" ? 25 : t === "FLAG_DEFEND" ? 50 : 75;
          this.targetEntity = tE;
          this.maxTimer = 20.0;
          this.defendTimer = 20.0;
          this.name =
            t === "FLAG_EXPLORE"
              ? "Explore Quest ⚑"
              : t === "FLAG_DEFEND"
                ? "Defend Quest ⚑"
                : t === "FLAG_GROUP_ATTACK"
                  ? "Group Quest ⚑"
                  : "Attack Quest ⚑";
          this.sourceTavern = sourceTav;
          this.radius = 20;
          this.hitboxOffset = { x: 0, y: -15 };
        }
        update(dtSec) {
          if (this.targetEntity) {
            if (!this.targetEntity.active) this.active = false;
            else {
              this.pos.x = this.targetEntity.pos.x;
              this.pos.y = this.targetEntity.pos.y - 30;
            }
          }
          if (this.active) {
            let ass = [];
            let fleeingCount = 0;
            let readyCount = 0;
            let atTargCount = 0;
            let defs = [];
            let totalHeroesNoGroup = 0;
            let druidCountAssigned = 0;

            for (let i = 0; i < Game.activeHeroes.length; i++) {
              const h = Game.activeHeroes[i];
              if (!h.groupId) totalHeroesNoGroup++;
              if (h.currentQuest === this) {
                ass.push(h);
                if (h.state === "FLEE") fleeingCount++;
                if (
                  ["WAITING_FOR_GROUP", "MOVE_TO_TARGET", "AT_TARGET"].includes(
                    h.questPhase,
                  )
                )
                  readyCount++;
                if (h.questPhase === "AT_TARGET") atTargCount++;
                if (h.classType === "DRUID") druidCountAssigned++;
                if (
                  this.type === "FLAG_DEFEND" &&
                  this.targetEntity &&
                  h.pos.distSq(this.targetEntity.pos) < 2500
                )
                  defs.push(h);
              }
            }

            if (this.type === "FLAG_GROUP_ATTACK") {
              if (ass.length === 0) {
                let availableGroups = [];
                if (
                  this.sourceTavern &&
                  this.sourceTavern.active &&
                  this.sourceTavern.groups
                ) {
                  for (let i = 0; i < 3; i++) {
                    let g = this.sourceTavern.groups[i];
                    if (g && g.length > 0) {
                      let groupMembers = [];
                      for (let j = 0; j < g.length; j++)
                        if (!g[j].isDead) groupMembers.push(g[j]);
                      if (
                        groupMembers.length > 0 &&
                        groupMembers.every((h) => !h.currentQuest)
                      ) {
                        availableGroups.push(groupMembers);
                      }
                    }
                  }
                }
                if (availableGroups.length > 0) {
                  availableGroups.sort(
                    (a, b) =>
                      a[0].pos.distSq(this.pos) - b[0].pos.distSq(this.pos),
                  );
                  let chosenGroup = availableGroups[0];
                  chosenGroup.forEach((h) => {
                    h.currentQuest = this;
                    h.questPhase =
                      h.target && h.target.faction === "ENEMY"
                        ? "FINISH_COMBAT"
                        : "HEAL_AT_BASE";
                  });
                }
              } else {
                let maxReq = ass.length;
                if (fleeingCount >= Math.max(1, Math.floor(maxReq / 2))) {
                  ass.forEach((a) => {
                    a.currentQuest = null;
                    a.questPhase = "NONE";
                    a.target =
                      a.tavern && a.tavern.active ? a.tavern : Game.base;
                    a.state = "FLEE";
                  });
                  this.active = false;
                  return;
                }
                if (readyCount >= maxReq) {
                  ass.forEach((a) => {
                    if (a.questPhase === "WAITING_FOR_GROUP")
                      a.questPhase = "MOVE_TO_TARGET";
                  });
                }

                if (atTargCount >= maxReq) {
                  const tp = this.targetEntity
                    ? this.targetEntity.pos
                    : this.pos;
                  const threats = Grid.getNearby(tp, 40000, "ENEMY");
                  let isClear = true;
                  for (let i = 0; i < threats.length; i++)
                    if (threats[i].isVisible) isClear = false;

                  if (isClear) {
                    const s = Math.floor(this.bounty / Math.max(1, ass.length));
                    ass.forEach((a) => {
                      a.personalGold += s;
                      a.lifetimeGold += s;
                      a.gainXp(15);
                      Game.spawnParticle(a.pos.x, a.pos.y, "#e53e3e");
                      a.currentQuest = null;
                      a.questPhase = "NONE";
                      a.state = "IDLE";
                    });
                    this.active = false;
                  }
                }
              }
              return;
            }

            const maxReq =
              this.type === "FLAG_EXPLORE"
                ? 1
                : Math.min(3, Math.max(1, totalHeroesNoGroup));
            if (maxReq === 0) return;

            if (ass.length < maxReq) {
              let av = [];
              for (let i = 0; i < Game.activeHeroes.length; i++) {
                const h = Game.activeHeroes[i];
                if (!h.currentQuest && !h.groupId) {
                  if (this.type === "FLAG_EXPLORE" && h.classType === "DRUID")
                    continue;
                  if (
                    this.type === "FLAG_ATTACK" &&
                    h.classType === "DRUID" &&
                    druidCountAssigned >= 1
                  )
                    continue;
                  av.push(h);
                }
              }
              if (av.length > 0) {
                if (this.type === "FLAG_ATTACK") {
                  av.sort((a, b) => {
                    let scoreA =
                      (10000 / Math.max(1, a.pos.distSq(Game.base.pos))) *
                      (a.hp / a.maxHp);
                    let scoreB =
                      (10000 / Math.max(1, b.pos.distSq(Game.base.pos))) *
                      (b.hp / b.maxHp);
                    return scoreB - scoreA;
                  });
                } else {
                  av.sort((a, b) => {
                    let getS = (h) =>
                      h.target && h.target.faction === "ENEMY"
                        ? 2
                        : h.state === "IDLE"
                          ? 0
                          : 1;
                    return (
                      getS(a) - getS(b) ||
                      b.hp / b.maxHp - a.hp / a.maxHp ||
                      a.pos.distSq(this.pos) - b.pos.distSq(this.pos)
                    );
                  });
                }
                while (ass.length < maxReq && av.length > 0) {
                  let h = av.shift();
                  h.currentQuest = this;
                  h.questPhase =
                    h.target && h.target.faction === "ENEMY"
                      ? "FINISH_COMBAT"
                      : "HEAL_AT_BASE";
                  ass.push(h);
                  if (h.classType === "DRUID") druidCountAssigned++;
                }
              }
            }
            if (this.type === "FLAG_DEFEND") {
              if (defs.length > 0) {
                this.defendTimer -= dtSec;
                if (this.defendTimer <= 0) {
                  const s = Math.floor(this.bounty / defs.length);
                  defs.forEach((d) => {
                    d.personalGold += s;
                    d.lifetimeGold += s;
                    d.gainXp(15);
                    Game.spawnParticle(d.pos.x, d.pos.y, "#ecc94b");
                    d.currentQuest = null;
                    d.questPhase = "NONE";
                    d.state = "IDLE";
                  });
                  this.active = false;
                }
              }
            } else if (this.type === "FLAG_ATTACK") {
              const fleeLimit = maxReq === 3 ? 2 : 1;
              if (fleeingCount >= fleeLimit) {
                ass.forEach((a) => {
                  a.currentQuest = null;
                  a.questPhase = "NONE";
                  a.target =
                    a.guild.active && a.guild.upgrades.includes("MED_TENT")
                      ? a.guild
                      : Game.base;
                  a.state = "FLEE";
                });
                this.active = false;
                return;
              }
              if (ass.length >= maxReq) {
                if (readyCount >= maxReq) {
                  ass.forEach((a) => {
                    if (a.questPhase === "WAITING_FOR_GROUP")
                      a.questPhase = "MOVE_TO_TARGET";
                  });
                }

                if (atTargCount >= maxReq) {
                  const tp = this.targetEntity
                    ? this.targetEntity.pos
                    : this.pos;
                  const threats = Grid.getNearby(tp, 40000, "ENEMY");
                  let isClear = true;
                  for (let i = 0; i < threats.length; i++)
                    if (threats[i].isVisible) isClear = false;

                  if (isClear) {
                    const s = Math.floor(this.bounty / Math.max(1, ass.length));
                    ass.forEach((a) => {
                      a.personalGold += s;
                      a.lifetimeGold += s;
                      a.gainXp(15);
                      Game.spawnParticle(a.pos.x, a.pos.y, "#e53e3e");
                      a.currentQuest = null;
                      a.questPhase = "NONE";
                      a.state = "IDLE";
                    });
                    this.active = false;
                  }
                }
              }
            }
          }
        }
        draw(ctx) {
          const isHovered = Game.hoveredEntity === this;
          const isSelected = Game.selectedEntity === this;
          if (isHovered || isSelected) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(this.pos.x + 8, this.pos.y - 20, 25, 0, Math.PI * 2);
            ctx.fillStyle = isSelected
              ? "rgba(236,201,75,0.2)"
              : "rgba(144,238,144,0.2)";
            ctx.fill();
            ctx.strokeStyle = isSelected ? "#ecc94b" : "#90ee90";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
          }
          ctx.beginPath();
          ctx.moveTo(this.pos.x, this.pos.y);
          ctx.lineTo(this.pos.x, this.pos.y - 30);
          ctx.strokeStyle = "#e2e8f0";
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(this.pos.x, this.pos.y - 30);
          ctx.lineTo(this.pos.x + 15, this.pos.y - 22);
          ctx.lineTo(this.pos.x, this.pos.y - 15);
          ctx.fillStyle =
            this.type === "FLAG_ATTACK" || this.type === "FLAG_GROUP_ATTACK"
              ? "#e53e3e"
              : this.type === "FLAG_DEFEND"
                ? "#3182ce"
                : "#ecc94b";
          ctx.fill();
          if (this.type === "FLAG_GROUP_ATTACK") {
            ctx.fillStyle = "white";
            ctx.font = "16px Arial";
            ctx.textAlign = "left";
            ctx.textBaseline = "middle";
            ctx.fillText("🍻", this.pos.x + 18, this.pos.y - 22);
          }
          if (this.type === "FLAG_DEFEND") {
            ctx.beginPath();
            ctx.arc(this.pos.x, this.pos.y, 40, 0, Math.PI * 2);
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = "rgba(49,130,206,0.5)";
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.setLineDash([]);
          }

          let assCount = 0;
          let totalHNoGroup = 0;
          for (let i = 0; i < Game.activeHeroes.length; i++) {
            if (Game.activeHeroes[i].currentQuest === this) assCount++;
            if (!Game.activeHeroes[i].groupId) totalHNoGroup++;
          }
          const maxR =
            this.type === "FLAG_EXPLORE"
              ? 1
              : this.type === "FLAG_GROUP_ATTACK"
                ? assCount
                : Math.min(3, Math.max(1, totalHNoGroup));

          ctx.fillStyle = "white";
          ctx.font = "11px Arial";
          ctx.textAlign = "center";
          ctx.fillText(`${assCount}/${maxR}`, this.pos.x, this.pos.y - 35);
          if (this.type === "FLAG_DEFEND" && this.defendTimer < 20) {
            ctx.fillStyle = "#ecc94b";
            ctx.font = "bold 12px Arial";
            ctx.fillText(
              `${Math.ceil(this.defendTimer)}s`,
              this.pos.x,
              this.pos.y - 48,
            );
          }
        }
      }

      class Spawner extends Entity {
        constructor(x, y, t = "RAT_HOLE") {
          super(x, y);
          this.isStatic = true;
          this.spawnerType = t;
          this.name =
            t === "WEB"
              ? "Spider Web"
              : t === "SNAKE_NEST"
                ? "Snake Nest"
                : "Rat Hole";
          this.faction = "ENEMY";
          this.type = "SPAWNER";
          this.hp = this.maxHp = t === "SNAKE_NEST" ? 400 : 150;

          const mainB = GameBounds.getMain();
          this.inCorridor =
            x < mainB.x1 || x > mainB.x2 || y < mainB.y1 || y > mainB.y2;

          if (this.inCorridor) {
            this.maxHp += 25;
            this.hp += 25;
          }
          this.daysSurvived = 0;

          this.baseRadius = t === "SNAKE_NEST" ? 15 : 20;
          this.radius = this.baseRadius;
          this.spawnRate = t === "SNAKE_NEST" ? 14.0 : 8.0;
          this.spawnTimer = Math.random() * this.spawnRate;
        }
        update(dtSec) {
          const inBlackout = Game.dayTimer <= 10.0;
          if (!inBlackout) {
            this.spawnTimer += dtSec;
            if (this.spawnTimer >= this.spawnRate) {
              this.spawnTimer = 0;
              const spawnCount = this.inCorridor
                ? 1
                : 1 + Math.floor(Math.random() * (this.daysSurvived + 1));
              for (let i = 0; i < spawnCount; i++) {
                const mx = this.pos.x + (Math.random() - 0.5) * 10;
                const my = this.pos.y + (Math.random() - 0.5) * 10;
                Game.addEntity(
                  new Monster(
                    mx,
                    my,
                    this.spawnerType === "WEB"
                      ? "SPIDER"
                      : this.spawnerType === "SNAKE_NEST"
                        ? "SNAKE"
                        : "RAT",
                    this.daysSurvived,
                  ),
                );
              }
            }
          }
        }
        die() {
          if (!this.active) return;
          super.die();
          Game.spawnersKilled++;

          const validAttackers = [];
          this.attackers.forEach((a) => {
            if (a.active) validAttackers.push(a);
          });

          if (validAttackers.length > 0) {
            const gY = 50;
            const tA = Math.floor(gY * Game.taxRate);
            const hA = gY - tA;
            Game.gold += tA;

            const sharedGold = Math.floor(hA / validAttackers.length);
            const sharedXpBase = Math.floor(50 / validAttackers.length) || 1;

            validAttackers.forEach((hero) => {
              const xpGain = Math.floor(
                sharedXpBase * (hero.currentQuest ? 1.2 : 1.0),
              );
              hero.gainXp(xpGain);
              hero.personalGold += sharedGold;
              hero.lifetimeGold += sharedGold;
            });

            for (let i = 0; i < Game.activeFlags.length; i++) {
              const f = Game.activeFlags[i];
              if (
                ["FLAG_ATTACK", "FLAG_GROUP_ATTACK"].includes(f.type) &&
                f.targetEntity === this
              ) {
                const bountyShare = Math.floor(
                  f.bounty / validAttackers.length,
                );
                for (let j = 0; j < validAttackers.length; j++) {
                  validAttackers[j].personalGold += bountyShare;
                  validAttackers[j].lifetimeGold += bountyShare;
                }
                f.active = false;
              }
            }
          }
          for (let i = 0; i < 2; i++)
            Game.spawnParticle(this.pos.x, this.pos.y, "#ecc94b");
        }
        draw(ctx) {
          const scale = this.radius / this.baseRadius;
          ctx.save();
          ctx.fillStyle = "#3e2723";
          ctx.beginPath();
          ctx.ellipse(
            this.pos.x,
            this.pos.y + 15 * scale,
            25 * scale,
            10 * scale,
            0,
            0,
            Math.PI * 2,
          );
          ctx.fill();
          ctx.restore();
          const ic =
            this.spawnerType === "WEB"
              ? "🕸️"
              : this.spawnerType === "SNAKE_NEST"
                ? "🪹"
                : "🕳️";

          const outC =
            Game.selectedEntity === this
              ? "#ecc94b"
              : Game.hoveredEntity === this
                ? "#90ee90"
                : null;
          const sp = SpriteCache.get(
            ic,
            40 + this.daysSurvived * 4,
            true,
            true,
            outC,
          );
          ctx.drawImage(sp.img, this.pos.x - sp.ox, this.pos.y - sp.oy);
          this.drawHP(ctx, -25 - this.daysSurvived * 2);
        }
      }

      class Volcano extends Entity {
        constructor(x, y) {
          super(x, y);
          this.isStatic = true;
          this.spawnerType = "VOLCANO";
          this.name = "Volcano";
          this.faction = "ENEMY";
          this.type = "SPAWNER";
          this.hp = this.maxHp = 1500;
          this.radius = 40;
          this.attackTimer = 40.0;
          this.towerAttackTimer = 1.5;
          this.towerDamage = 30;
          this.attackRange = 110;
          this.lastTowerTarget = null;
          this.ashRadius = 110;
        }
        update(dtSec) {
          if (this.stunTimer > 0) {
            this.stunTimer -= dtSec;
            return;
          }
          this.attackTimer -= dtSec;
          if (this.attackTimer <= 0) {
            this.attackTimer = 40.0;
            let targets = [];
            for (let i = 0; i < Game.playerEntities.length; i++) {
              if (BUILDING_CONFIG[Game.playerEntities[i].type])
                targets.push(Game.playerEntities[i]);
            }
            if (targets.length > 0) {
              targets.sort(() => Math.random() - 0.5);
              const hitCount = Math.min(3, targets.length);
              const dmg = 40;
              for (let i = 0; i < hitCount; i++) {
                Game.projectiles.push(
                  new Projectile(
                    this.pos.x + (Math.random() - 0.5) * 40,
                    this.pos.y - 40 + (Math.random() - 0.5) * 40,
                    targets[i],
                    dmg,
                    this,
                    "FIREBALL",
                  ),
                );
              }
              Game.spawnFloatingText(
                this.pos.x,
                this.pos.y - 60,
                "ERUPTION!",
                "#e53e3e",
                2.0,
                24,
              );
            }
          }

          this.towerAttackTimer -= dtSec;
          if (this.towerAttackTimer <= 0) {
            this.towerAttackTimer = 1.5;
            let possibleTargets = [];
            let backupTargets = [];
            const arSq = this.attackRange ** 2;
            for (let i = 0; i < Game.activeHeroes.length; i++) {
              const h = Game.activeHeroes[i];
              if (
                !h.isDead &&
                h.state !== "FLEE" &&
                this.pos.distSq(h.pos) <= arSq
              ) {
                backupTargets.push(h);
                if (h !== this.lastTowerTarget) possibleTargets.push(h);
              }
            }
            if (possibleTargets.length === 0) possibleTargets = backupTargets;

            if (possibleTargets.length > 0) {
              const target =
                possibleTargets[
                  Math.floor(Math.random() * possibleTargets.length)
                ];
              this.lastTowerTarget = target;
              Game.projectiles.push(
                new Projectile(
                  this.pos.x,
                  this.pos.y - 40,
                  target,
                  this.towerDamage,
                  this,
                  "LAVA_ROCK",
                ),
              );
            }
          }
        }
        die() {
          if (!this.active) return;
          super.die();
          Game.spawnersKilled++;

          const validAttackers = [];
          this.attackers.forEach((a) => {
            if (a.active) validAttackers.push(a);
          });

          if (validAttackers.length > 0) {
            const gY = 200;
            const tA = Math.floor(gY * Game.taxRate);
            const hA = gY - tA;
            Game.gold += tA;
            const sharedGold = Math.floor(hA / validAttackers.length);
            const sharedXpBase = Math.floor(200 / validAttackers.length) || 1;
            validAttackers.forEach((hero) => {
              hero.kills++;
              hero.gainXp(
                Math.floor(sharedXpBase * (hero.currentQuest ? 1.2 : 1.0)),
              );
              hero.personalGold += sharedGold;
              hero.lifetimeGold += sharedGold;
            });
            for (let i = 0; i < Game.activeFlags.length; i++) {
              const f = Game.activeFlags[i];
              if (
                ["FLAG_ATTACK", "FLAG_GROUP_ATTACK"].includes(f.type) &&
                f.targetEntity === this
              ) {
                const bountyShare = Math.floor(
                  f.bounty / validAttackers.length,
                );
                for (let j = 0; j < validAttackers.length; j++) {
                  validAttackers[j].personalGold += bountyShare;
                  validAttackers[j].lifetimeGold += bountyShare;
                }
                f.active = false;
              }
            }
          }
          for (let i = 0; i < 10; i++)
            Game.spawnParticle(this.pos.x, this.pos.y, "#e53e3e");
          for (let i = 0; i < 10; i++)
            Game.spawnParticle(this.pos.x, this.pos.y, "#ecc94b");
        }
        draw(ctx) {
          const ash = SpriteCache.getAshPit(this.ashRadius);
          ctx.drawImage(ash.img, this.pos.x - ash.ox, this.pos.y - ash.oy);

          ctx.save();
          ctx.fillStyle = "#3e2723";
          ctx.beginPath();
          ctx.ellipse(this.pos.x, this.pos.y + 20, 50, 15, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          const outC =
            Game.selectedEntity === this
              ? "#ecc94b"
              : Game.hoveredEntity === this
                ? "#90ee90"
                : null;
          const sp = SpriteCache.get("🗻", 80, true, true, outC);
          ctx.drawImage(sp.img, this.pos.x - sp.ox, this.pos.y - sp.oy);

          ctx.fillStyle = "#e53e3e";
          ctx.font = "bold 16px Arial";
          ctx.textAlign = "center";
          ctx.fillText(
            Math.ceil(this.attackTimer) + "s",
            this.pos.x,
            this.pos.y - 60,
          );
          this.drawHP(ctx, -40);
        }
      }

      const Game = {
        gold: 500,
        taxRate: 0.5,
        day: 1,
        dayTimer: 65.0,
        passiveGoldTimer: 10.0,
        frames: 0,
        timeMs: 0,
        mode: "NONE",
        isPaused: false,
        fogOfWar: true,
        shopActiveSlot: null,
        tavernActiveSlot: null,
        tavernDraftGroup: [],
        entities: [],
        playerEntities: [],
        enemyEntities: [],
        flags: [],
        shops: [],
        particles: [],
        projectiles: [],
        floatingTexts: [],
        renderStatic: [],
        renderDynamic: [],
        staticDirty: true,
        activeHeroes: [],
        activeShops: [],
        activeFlags: [],
        activeSpawners: [],
        corridors: [],
        bgBounds: { x: 0, y: 0 },
        guildBanks: { WARRIOR: 0, ROGUE: 0, DRUID: 0 },
        base: null,
        selectedEntity: null,
        hoveredEntity: null,
        gameOver: false,
        heroDeaths: 0,
        buildingDeaths: 0,
        spawnersKilled: 0,
        emergencyMedicalCosts: 0,
        hallOfFame: [],
        selectedTavernForGroupQuest: null,

        addEntity(ent) {
          this.entities.push(ent);
          if (ent.isStatic) this.staticDirty = true;
        },

        cycleGroupQuestTavern() {
          const validTaverns = this.playerEntities.filter((e) => {
            if (e.type !== "TAVERN" || !e.groups) return false;
            for (let i = 0; i < 3; i++) {
              if (
                e.groups[i] &&
                e.groups[i].length > 0 &&
                e.groups[i].every((h) => !h.isDead && !h.currentQuest)
              )
                return true;
            }
            return false;
          });

          if (validTaverns.length === 0) {
            this.selectedTavernForGroupQuest = null;
            return;
          }

          if (
            !this.selectedTavernForGroupQuest ||
            validTaverns.indexOf(this.selectedTavernForGroupQuest) === -1
          ) {
            this.selectedTavernForGroupQuest = validTaverns[0];
          } else {
            let idx = validTaverns.indexOf(this.selectedTavernForGroupQuest);
            this.selectedTavernForGroupQuest =
              validTaverns[(idx + 1) % validTaverns.length];
          }
        },

        getGuildCost(type) {
          const conf = BUILDING_CONFIG[type];
          if (!conf) return 0;
          let c = conf.baseCost;
          if (conf.isGuild) {
            c +=
              this.playerEntities.filter((e) => e.type === type).length * 100;
          }
          return c;
        },

        getPopulation() {
          let cur = 0,
            max = 0;
          for (let i = 0; i < this.playerEntities.length; i++) {
            const e = this.playerEntities[i];
            if (e.classType || e.type === "TOWER") cur++;
            if (e.type === "TOWER" && e.isUpgraded) cur++;
            if (e.type === "CASTLE") max += 5;
            else if (e.type === "FARM") max += e.isUpgraded ? 6 : 3;
          }
          return { cur, max };
        },

        setTaxRate(rate) {
          this.taxRate = rate;
          [0, 25, 50, 75, 100].forEach((r) => {
            UI.setClass(`btn-tax-${r}`, "active", r === rate * 100);
          });
        },
        toggleRepair() {
          const e = this.selectedEntity;
          if (e && BUILDING_CONFIG[e.type] && e.faction === "PLAYER") {
            if (!e.isRepairing && e.hp >= e.maxHp) return;
            e.isRepairing = !e.isRepairing;
            this.updateUI(true);
          }
        },
        positionUI() {
          const panel = document.getElementById("info-panel");
          if (
            this.selectedEntity &&
            this.selectedEntity.active &&
            panel.style.display !== "none"
          ) {
            const e = this.selectedEntity;
            const screenX =
              (e.pos.x - Camera.x) * Camera.zoom + canvas.width / 2;
            const screenY =
              (e.pos.y - Camera.y) * Camera.zoom + canvas.height / 2;
            const radiusScaled = e.radius * Camera.zoom;
            let px = screenX + radiusScaled + 15,
              py = screenY - radiusScaled - 10;
            if (px + panel.offsetWidth > window.innerWidth - 10)
              px = screenX - radiusScaled - panel.offsetWidth - 15;
            if (px < 10) px = 10;
            if (py < 40) py = 40;
            if (py + panel.offsetHeight > window.innerHeight - 100)
              py = window.innerHeight - panel.offsetHeight - 100;
            panel.style.left = px + "px";
            panel.style.top = py + "px";
          }
        },
        updateUI(force = false) {
          if (!force && this.frames % 15 !== 0) return;
          UI.setText("gold-display", Math.floor(this.gold));
          let secs = Math.ceil(this.dayTimer);
          UI.setText("day-timer-display", secs.toString().padStart(2, "0"));
          UI.setText("day-text", `Day ${this.day}:`);

          const { cur: currentPop, max: maxPop } = this.getPopulation();

          UI.setText("pop-display", `${currentPop}/${maxPop}`);
          const updateBtn = (id, cost) => {
            const btn = document.getElementById(id);
            if (btn) {
              let canAfford = this.gold >= cost;
              if (id === "btn-tower")
                canAfford = canAfford && currentPop < maxPop;
              if (id === "btn-flag-group-attack") {
                let hasAnyGroup = false;
                for (let i = 0; i < this.playerEntities.length; i++) {
                  const e = this.playerEntities[i];
                  if (e.type === "TAVERN" && e.groups) {
                    for (let j = 0; j < 3; j++) {
                      if (
                        e.groups[j] &&
                        e.groups[j].length > 0 &&
                        e.groups[j].every((h) => !h.isDead && !h.currentQuest)
                      ) {
                        hasAnyGroup = true;
                        break;
                      }
                    }
                  }
                  if (hasAnyGroup) break;
                }
                canAfford = canAfford && hasAnyGroup;
              }
              UI.setDisabled(btn, !canAfford);
              const costSpan = btn.querySelector(".build-btn-cost");
              if (costSpan) {
                UI.setColor(
                  costSpan,
                  this.gold >= cost ? "#ecc94b" : "#e53e3e",
                );
                if (
                  id.startsWith("btn-") &&
                  ![
                    "btn-flag-explore",
                    "btn-flag-defend",
                    "btn-flag-attack",
                    "btn-flag-group-attack",
                  ].includes(id)
                ) {
                  UI.setText(
                    costSpan,
                    id === "btn-tower" ? `🪙${cost} | 1 🫂` : `🪙${cost}`,
                  );
                }
              }
            }
          };
          [
            "btn-warrior-guild",
            "btn-rogue-guild",
            "btn-druid-guild",
            "btn-shop",
            "btn-farm",
            "btn-tower",
            "btn-tavern",
          ].forEach((id) =>
            updateBtn(
              id,
              id === "btn-tower"
                ? 500
                : id === "btn-tavern"
                  ? 200
                  : this.getGuildCost(
                      id.replace("btn-", "").toUpperCase().replace(/-/g, "_"),
                    ),
            ),
          );
          [
            "btn-flag-explore",
            "btn-flag-defend",
            "btn-flag-attack",
            "btn-flag-group-attack",
          ].forEach((id) =>
            updateBtn(
              id,
              id === "btn-flag-explore"
                ? 25
                : id === "btn-flag-defend"
                  ? 50
                  : 75,
            ),
          );

          const panel = document.getElementById("info-panel");
          if (this.selectedEntity && this.selectedEntity.active) {
            UI.setDisplay(panel, "block");
            const e = this.selectedEntity;
            const displayIcon =
              e.isUpgraded && BUILDING_CONFIG[e.type].upgradedIcon
                ? BUILDING_CONFIG[e.type].upgradedIcon
                : BUILDING_CONFIG[e.type]
                  ? BUILDING_CONFIG[e.type].icon
                  : "";
            let displayName =
              e.name ||
              (BUILDING_CONFIG[e.type]
                ? `${BUILDING_CONFIG[e.type].name} ${displayIcon}`
                : e.type || e.classType || "Entity");

            if (e.faction === "PLAYER" && BUILDING_CONFIG[e.type]) {
              UI.setDisplay("btn-repair", "block");
              UI.setClass("btn-repair", "active", !!e.isRepairing);
            } else {
              UI.setDisplay("btn-repair", "none");
            }
            UI.setDisplay(
              "btn-abandon",
              e.type.startsWith("FLAG_") ? "block" : "none",
            );

            const toggle = (id, show) =>
              UI.setDisplay(id, show ? "flex" : "none");
            [
              "stat-tombstone",
              "stat-level",
              "stat-xp",
              "stat-gold",
              "stat-kills",
              "stat-dmg",
              "stat-items",
              "stat-state",
              "stat-tower-dmg",
            ].forEach((id) => toggle(id, false));
            UI.setDisplay("shop-config", "none");
            UI.setDisplay("guild-config", "none");
            UI.setDisplay("tavern-config", "none");
            UI.setDisplay("farm-config", "none");
            UI.setDisplay("tower-config", "none");

            if (e.type === "TOMBSTONE") {
              UI.setHTML("info-name", `Tombstone 🪦`);
              UI.setHTML(
                "stat-tombstone",
                `"Here Lies ${e.name} of the ${e.guildName} Guild.<br>They were level ${e.level}, and killed ${e.kills} monsters."`,
              );
              UI.setDisplay("stat-tombstone", "block");
            } else {
              let bountyStr = "";
              if (e.faction === "ENEMY") {
                const gY =
                  e.type === "MONSTER"
                    ? Math.floor(15 * Math.pow(1.1, e.buffStacks))
                    : 50;
                bountyStr = `<span style="color:#ecc94b; font-size:0.9rem;">🪙${gY}</span>`;
              }
              UI.setHTML(
                "info-name",
                `<span style="width:100%; display:flex; justify-content:space-between;"><span>${displayName} <span style="font-size: 0.75rem; color: #a0aec0;">[${Math.floor(e.hp)}/${e.maxHp} HP]</span></span>${bountyStr}</span>`,
              );
            }
            if (e.faction === "PLAYER" && e.classType) {
              UI.setText("val-level", e.level);
              UI.setText("val-xp", `${e.xp} / ${e.level * 100}`);
              UI.setText("val-gold", `${Math.floor(e.personalGold)}g`);
              UI.setColor(
                "val-gold",
                e.personalGold < 0 ? "#e53e3e" : "#ecc94b",
              );
              UI.setText("val-kills", e.kills);
              UI.setText("val-dmg", e.damage);
              UI.setText(
                "val-items",
                e.items.length > 0 ? e.items.join(", ") : "None",
              );
              UI.setText("val-state", e.getDisplayState());
              [
                "stat-level",
                "stat-xp",
                "stat-gold",
                "stat-kills",
                "stat-dmg",
                "stat-items",
                "stat-state",
              ].forEach((id) => toggle(id, true));
            } else if (e.type === "TOWER") {
              toggle("stat-tower-dmg", true);
              UI.setText(
                "val-tower-dmg",
                e.isUpgraded ? "20x3 (Magic)" : "20 (Magic)",
              );

              UI.setDisplay("tower-config", "block");
              const upgBtn = document.getElementById("btn-upg-tower");
              if (e.isUpgraded) {
                UI.setDisabled(upgBtn, true);
                UI.setText("tower-upg-cost", "Upgraded");
                UI.setColor("tower-upg-cost", "#a0aec0");
              } else {
                const canAfford = this.gold >= 800 && currentPop < maxPop;
                UI.setDisabled(upgBtn, !canAfford);
                UI.setText("tower-upg-cost", "🪙800 | 1 🫂");
                UI.setColor(
                  "tower-upg-cost",
                  this.gold >= 800 ? "#ecc94b" : "#e53e3e",
                );
              }
            }

            if (e.type === "SHOP") {
              UI.setDisplay("shop-config", "block");
              if (Game.shopActiveSlot !== null) {
                UI.setDisplay("shop-select-ui", "block");
                UI.setDisplay("shop-slots-ui", "none");
                Object.keys(ITEM_CONFIG).forEach((id) => {
                  UI.setDisabled(
                    `btn-shop-${id}`,
                    this.gold < ITEM_CONFIG[id].cost,
                  );
                });
              } else {
                UI.setDisplay("shop-select-ui", "none");
                UI.setDisplay("shop-slots-ui", "block");
                for (let i = 0; i < 3; i++) {
                  UI.setHTML(
                    `shop-slot-${i}`,
                    e.slots[i] === "NONE"
                      ? "Empty"
                      : `<span style="font-size:1.5rem">${ITEM_CONFIG[e.slots[i]].icon}</span>`,
                  );
                }
              }
            } else if (
              ["WARRIOR_GUILD", "ROGUE_GUILD", "DRUID_GUILD"].includes(e.type)
            ) {
              UI.setDisplay("guild-config", "block");
              const br = document.getElementById("btn-recruit");
              const hClass = BUILDING_CONFIG[e.type].heroClass;
              const hConf = HERO_CONFIG[hClass];

              const deadHero = e.heroes.find((h) => h.isDead);
              const homelessHeroes = Game.activeHeroes.filter(
                (h) => !h.isDead && h.classType === hClass && !h.guild.active,
              );
              let btnCost = hConf.recruitCost;

              if (homelessHeroes.length > 0 && e.heroes.length < e.maxHeroes) {
                UI.setDisplay("btn-adopt", "block");
              } else {
                UI.setDisplay("btn-adopt", "none");
              }

              if (deadHero) {
                btnCost = hConf.recruitCost + (deadHero.level - 1) * 100;
                UI.setText("recruit-icon", "🪦");
                UI.setText("recruit-cost", `🪙${btnCost} | 1 🫂`);
                br.setAttribute("onclick", "Game.reviveHero()");

                const hd = br.querySelector(".build-btn-hotkey");
                if (hd) hd.innerText = "G";
                const td = br.querySelector(".build-btn-title");
                if (td) td.innerText = "Revive";

                br.onmouseenter = (ev) =>
                  Game.showTooltip(
                    ev,
                    `Revive ${deadHero.name}`,
                    `Revive your fallen hero.<br><span style="color:#ecc94b; font-style:italic;">Requires 1 🫂 (Population). Revive cost includes level penalty.</span>`,
                  );

                UI.setDisabled(br, this.gold < btnCost || currentPop >= maxPop);
              } else {
                UI.setText("recruit-icon", hConf.icon);
                UI.setText("recruit-cost", `🪙${btnCost} | 1 🫂`);
                br.setAttribute("onclick", "Game.recruitHero()");

                const hd = br.querySelector(".build-btn-hotkey");
                if (hd) hd.innerText = "T";
                const td = br.querySelector(".build-btn-title");
                if (td) td.innerText = "Train";

                br.onmouseenter = (ev) =>
                  Game.showTooltip(
                    ev,
                    "Train Hero",
                    `Recruit a new hero to join this guild.<br><span style="color:#ecc94b; font-style:italic;">Requires 1 🫂 (Population)</span>`,
                  );

                UI.setDisabled(
                  br,
                  this.gold < btnCost ||
                    e.heroes.length >= e.maxHeroes ||
                    currentPop >= maxPop,
                );
              }

              UI.setHTML(
                "guild-roster",
                `Roster: ${e.heroes.length}/${e.maxHeroes} | Guild Bank: <span style="color:#ecc94b">${Game.guildBanks[hClass]}g</span>`,
              );

              let rosterHTML = "";
              e.heroes.forEach((h) => {
                const icon = h.isDead ? "🪦" : hConf.icon;
                rosterHTML += `<div class="roster-icon" onmouseenter="Game.showHeroTooltip(event, '${h.id}')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">${icon}</div>`;
              });
              UI.setHTML("guild-roster-icons", rosterHTML);

              const upgs = ["CHARGE", "RAT_TRAP", "REGROWTH", "MED_TENT"];
              upgs.forEach((u) => UI.setDisplay(`btn-upg-${u}`, "none"));

              const showUpg = (u) => {
                if (!e.upgrades.includes(u)) {
                  UI.setDisplay(`btn-upg-${u}`, "block");
                  UI.setDisabled(
                    `btn-upg-${u}`,
                    this.gold < UPGRADE_CONFIG[u].cost,
                  );
                }
              };
              if (hClass === "WARRIOR") {
                showUpg("CHARGE");
                showUpg("MED_TENT");
              } else if (hClass === "ROGUE") {
                showUpg("RAT_TRAP");
                showUpg("MED_TENT");
              } else if (hClass === "DRUID") {
                showUpg("REGROWTH");
                showUpg("MED_TENT");
              }

              const updateCostColor = (bId, c) => {
                const b = document.getElementById(bId);
                if (b && b.style.display !== "none") {
                  const cs = b.querySelector(".build-btn-cost");
                  if (cs)
                    UI.setColor(cs, this.gold >= c ? "#ecc94b" : "#e53e3e");
                }
              };
              updateCostColor("btn-recruit", btnCost);
              upgs.forEach((u) =>
                updateCostColor(`btn-upg-${u}`, UPGRADE_CONFIG[u].cost),
              );
            } else if (e.type === "TAVERN") {
              UI.setDisplay("tavern-config", "block");

              if (Game.tavernActiveSlot !== null) {
                UI.setDisplay("tavern-select-ui", "block");
                UI.setDisplay("tavern-slots-ui", "none");

                let gridHTML = "";
                const availableHeroes = Game.activeHeroes.filter(
                  (h) => !h.isDead && !h.groupId,
                );
                availableHeroes.sort(
                  (a, b) => b.level - a.level || a.id.localeCompare(b.id),
                );

                availableHeroes.forEach((h) => {
                  const isSelected = Game.tavernDraftGroup.includes(h.id);
                  const hConf = HERO_CONFIG[h.classType];
                  gridHTML += `<button class="shop-item-btn ${isSelected ? "selected" : ""}" style="border-width: 2px; padding: 4px;" onclick="Game.toggleTavernHero('${h.id}')">
                            <span class="item-icon">${hConf.icon}</span>
                            <span class="item-cost" style="color: white; font-size: 0.65rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; text-align: center; display: block;">${h.name}</span>
                            <span class="item-classes" style="color: #ecc94b; font-weight: bold;">Lvl ${h.level}</span>
                        </button>`;
                });
                if (availableHeroes.length === 0)
                  gridHTML = `<div style="grid-column: 1 / -1; text-align: center; color: #a0aec0; font-size: 0.8rem; padding: 10px;">No available heroes.</div>`;
                UI.setHTML("tavern-hero-grid", gridHTML);

                UI.setDisabled(
                  "btn-form-group",
                  Game.tavernDraftGroup.length < 2 ||
                    Game.tavernDraftGroup.length > 4 ||
                    this.gold < 100,
                );
              } else {
                UI.setDisplay("tavern-select-ui", "none");
                UI.setDisplay("tavern-slots-ui", "block");
                let slotsHTML = "";
                for (let i = 0; i < 3; i++) {
                  const grp = e.groups[i];
                  if (!grp || grp.length === 0) {
                    const canAfford = this.gold >= 100;
                    slotsHTML += `<div style="display: flex; align-items: center; gap: 10px; background: #2d3748; padding: 6px; border: 1px solid #4a5568; border-radius: 4px; height: 50px; box-sizing: border-box;">
                                <button class="menu-btn build-btn" style="width: 40px; height: 40px; margin: 0; flex-shrink: 0; display: flex; justify-content: center; align-items: center;" onclick="Game.openTavernDraft(${i})" ${canAfford ? "" : "disabled"}>
                                    <div style="font-size: 1.5rem; margin-top: -5px;">+</div>
                                    <div class="build-btn-cost-badge" style="bottom: -8px; padding: 1px 4px;"><span class="build-btn-cost" style="color: ${canAfford ? "#ecc94b" : "#e53e3e"}; font-size: 0.6rem;">🪙100</span></div>
                                </button>
                                <span style="color: #a0aec0; font-size: 0.8rem; font-style: italic; margin-left: 5px;">Empty Group Slot</span>
                            </div>`;
                  } else {
                    let iconsHTML = "";
                    grp.forEach((h) => {
                      const hConf = HERO_CONFIG[h.classType];
                      const icon = h.isDead ? "🪦" : hConf.icon;
                      iconsHTML += `<div class="roster-icon" onmouseenter="Game.showHeroTooltip(event, '${h.id}')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">${icon}</div>`;
                    });
                    slotsHTML += `<div style="display: flex; align-items: center; gap: 8px; background: #2d3748; padding: 6px; border: 1px solid #4a5568; border-radius: 4px; height: 50px; box-sizing: border-box; overflow-x: auto;">
                                ${iconsHTML}
                            </div>`;
                  }
                }
                UI.setHTML("tavern-groups-container", slotsHTML);
              }
            } else if (e.type === "FARM") {
              UI.setDisplay("farm-config", "block");
              const upgBtn = document.getElementById("btn-upg-farm");
              if (e.isUpgraded) {
                UI.setDisabled(upgBtn, true);
                UI.setText("farm-upg-cost", "Upgraded");
                UI.setColor("farm-upg-cost", "#a0aec0");
              } else {
                UI.setDisabled(upgBtn, this.gold < 150);
                UI.setText("farm-upg-cost", "🪙150");
                UI.setColor(
                  "farm-upg-cost",
                  this.gold >= 150 ? "#ecc94b" : "#e53e3e",
                );
              }
            } else {
              if (
                Game.shopActiveSlot !== null ||
                Game.tavernActiveSlot !== null
              )
                Game.hideTooltip();
              Game.shopActiveSlot = null;
              Game.tavernActiveSlot = null;
            }
            this.positionUI();
          } else {
            UI.setDisplay(panel, "none");
            this.selectedEntity = null;
            if (this.shopActiveSlot !== null || this.tavernActiveSlot !== null)
              this.hideTooltip();
            this.shopActiveSlot = null;
            this.tavernActiveSlot = null;
          }
        },
        openTavernDraft(slot) {
          this.tavernActiveSlot = slot;
          this.tavernDraftGroup = [];
          this.updateUI(true);
        },
        toggleTavernHero(id) {
          const idx = this.tavernDraftGroup.indexOf(id);
          if (idx > -1) {
            this.tavernDraftGroup.splice(idx, 1);
          } else {
            if (this.tavernDraftGroup.length < 4)
              this.tavernDraftGroup.push(id);
          }
          this.updateUI(true);
        },
        formTavernGroup() {
          if (
            this.selectedEntity &&
            this.selectedEntity.type === "TAVERN" &&
            this.tavernActiveSlot !== null
          ) {
            if (

    canPlaceBuilding(x, y, radius) {

              x -= off + w;

            } else if (y - off - h > 0 && x + off + w < window.innerWidth) {
              x += off;
              y -= off + h;
            } else if (y + off + h < window.innerHeight && x - off - w > 0) {
              x -= off + w;
              y += off;
            } else {

              .filter((e) => e.classType)

                name: h.name,
                classType: h.classType,
                level: h.level,
                kills: h.kills,
                gold: h.lifetimeGold,
              })),
          ];
          hall.sort((a, b) => b.level - a.level || b.kills - a.kills);
          const top10 = hall.slice(0, 10);

          const titleText = isGameOver ? "KINGDOM DESTROYED" : "GAME STATS";
          const btnText = isGameOver ? "Rebuild Kingdom" : "Resume Game";
          const btnAction = isGameOver
            ? "location.reload()"
            : "Game.togglePause()";
          const themeColor = isGameOver ? "#e53e3e" : "#3182ce";

          let html = `<div class="go-title" style="color: ${themeColor}; border-bottom-color: ${themeColor};">${titleText}</div><div class="score-grid">`;
          html += `<div class="stat-box" style="flex-grow:1;"><h3 style="margin-top: 0; margin-bottom: 5px;">Top 10 Highest Level Heroes</h3><div class="go-table-container"><table class="go-table"><tr><th>Hero</th><th>Class</th><th>Level</th><th>Monsters Killed</th><th>Gold Generated</th></tr>`;

            ROGUE: "Rogue",

          top10.forEach(

              (html += `<tr><td>${h.name}</td><td>${classNames[h.classType] || h.classType}</td><td>${h.level}</td><td>${h.kills}</td><td>${Math.floor(h.gold)}g</td></tr>`),

        const go = document.getElementById('game-over'); go.innerHTML = html; go.style.borderColor = themeColor; go.style.display = 'flex';
    }
};

        Game.frames++; const dtS = TIME_STEP/1000; Game.timeMs+=TIME_STEP; Camera.zoom+=(Camera.targetZoom-Camera.zoom)*0.1;
        if (!isPanning) { const ps=15/Camera.zoom; if(keys['w']||keys['arrowup']) Camera.y-=ps; if(keys['s']||keys['arrowdown']) Camera.y+=ps; if(keys['a']||keys['arrowleft']) Camera.x-=ps; if(keys['d']||keys['arrowright']) Camera.x+=ps; }
        Camera.x=Math.max(-800,Math.min(WORLD_WIDTH+800,Camera.x)); Camera.y=Math.max(-800,Math.min(WORLD_HEIGHT+800,Camera.y));
        Game.dayTimer-=dtS; if(Game.dayTimer<=0) { 
            Game.day++; Game.dayTimer=65.0; 

            let eRats=0, eSpiders=0, eSnakes=0;
            const mainB = GameBounds.getMain();
            Game.entities.forEach((e) => {
              if (e.type === "SPAWNER" && e.spawnerType !== "VOLCANO") {
                e.daysSurvived++;
                e.radius = e.baseRadius + e.daysSurvived * 2;
                e.maxHp += 50;
                e.hp += 50;
                if (
                  e.pos.x >= mainB.x1 &&
                  e.pos.x <= mainB.x2 &&
                  e.pos.y >= mainB.y1 &&
                  e.pos.y <= mainB.y2
                ) {
                  if (e.spawnerType === "RAT_HOLE") eRats++;
                  else if (e.spawnerType === "WEB") eSpiders++;
                  else if (e.spawnerType === "SNAKE_NEST") eSnakes++;
                }
              }
            });

            const triggerDays = [9, 15, 20, 25];
            if (triggerDays.includes(Game.day)) {
              const expectedCorridors = triggerDays.indexOf(Game.day) + 1;
              if (Game.corridors.length < expectedCorridors) {
                const dirs = ["NORTH", "SOUTH", "EAST", "WEST"];
                const availableDirs = dirs.filter(
                  (d) => !Game.corridors.find((c) => c.dir === d),
                );
                if (availableDirs.length > 0) {
                  const pick =
                    availableDirs[
                      Math.floor(Math.random() * availableDirs.length)
                    ];

                  Game.corridors.push({ dir: pick, dayOpened: Game.day });

                  Game.activeSpawners.forEach((s) => {
                    if (s.spawnerType === "VOLCANO") {
                      s.maxHp += 250;
                      s.hp += 250;
                      s.towerDamage += 10;
                    }
                  });

                  generateTerrain();
                  Game.spawnFloatingText(
                    WORLD_WIDTH / 2,
                    WORLD_HEIGHT / 2 - 100,
                    "A new path has opened!",
                    "#ecc94b",
                    4.0,
                    30,
                  );

                  Game.spawnVolcano(pick);

                  Game.spawnHole("RAT_HOLE", true, pick);
                  Game.spawnHole("WEB", true, pick);
                  Game.spawnHole("SNAKE_NEST", true, pick);
                }
              }
            }

            let ed = Math.min(Game.day, 10),
              ns = ed >= 4 ? Math.floor((ed - 2) / 2) : 0,
              nr = ed - ns,
              nsn = 0;
            if (Game.day > 10) {
              nr = Math.max(0, nr - 2);
              nsn = Game.day - 10;
            }

            if (Game.corridors.length > 0) {
              nr = Math.max(0, nr - 1);
              ns = Math.max(0, ns - 1);
            }

            for (let i = 0; i < Math.max(0, nr - eRats); i++)
              Game.spawnHole("RAT_HOLE", false);
            for (let i = 0; i < Math.max(0, ns - eSpiders); i++)
              Game.spawnHole("WEB", false);
            for (let i = 0; i < Math.max(0, nsn - eSnakes); i++)
              Game.spawnHole("SNAKE_NEST", false);

            Game.corridors.forEach((c) => {
              const area = GameBounds.getCorridor(c.dir);
              let counts = { RAT_HOLE: 0, WEB: 0, SNAKE_NEST: 0, VOLCANO: 0 };

              Game.entities.forEach((s) => {
                if (
                  s.type === "SPAWNER" &&
                  s.pos.x >= area.x1 &&
                  s.pos.x <= area.x2 &&
                  s.pos.y >= area.y1 &&
                  s.pos.y <= area.y2
                ) {
                  if (s.spawnerType === "VOLCANO") counts["VOLCANO"]++;
                  else counts[s.spawnerType] = (counts[s.spawnerType] || 0) + 1;
                }
              });

              if (counts["VOLCANO"] === 0) Game.spawnVolcano(c.dir);

              let daysOpen = Game.day - c.dayOpened + 1;
              let targetRats = Math.min(2, daysOpen);
              let targetSpiders = daysOpen >= 3 ? 2 : 1;
              let targetSnakes = daysOpen >= 4 ? 2 : 1;

              for (let i = counts["RAT_HOLE"]; i < targetRats; i++)
                Game.spawnHole("RAT_HOLE", true, c.dir);
              for (let i = counts["WEB"]; i < targetSpiders; i++)
                Game.spawnHole("WEB", true, c.dir);
              for (let i = counts["SNAKE_NEST"]; i < targetSnakes; i++)
                Game.spawnHole("SNAKE_NEST", true, c.dir);
            });
          }
          Game.passiveGoldTimer -= dtS;
          if (Game.passiveGoldTimer <= 0) {
            Game.passiveGoldTimer += 10.0;
            if (Game.day === 1) {
              let gain = 0;
              Game.playerEntities.forEach((e) => {
                if (e.type === "CASTLE") gain += 25;
                else if (
                  [
                    "WARRIOR_GUILD",
                    "ROGUE_GUILD",
                    "DRUID_GUILD",
                    "FARM",
                  ].includes(e.type)
                )
                  gain += 10;
              });
              Game.gold += gain;
            }
          }

          let updateStatic = Game.staticDirty;
          if (updateStatic) Game.renderStatic.length = 0;
          Game.renderDynamic.length = 0;

          Game.playerEntities.length = 0;
          Game.enemyEntities.length = 0;
          Game.activeHeroes.length = 0;
          Game.activeShops.length = 0;
          Game.activeFlags.length = 0;
          Game.activeSpawners.length = 0;
          Game.shops.length = 0;
          Game.flags.length = 0;
          Grid.clear();
          for (let i = Game.entities.length - 1; i >= 0; i--) {
            const e = Game.entities[i];
            if (!e.active) {
              if (e.isStatic) Game.staticDirty = true;
              Game.entities[i] = Game.entities[Game.entities.length - 1];
              Game.entities.pop();
              continue;
            }
            Grid.insert(e);
            if(e.faction==='PLAYER') Game.playerEntities.push(e);
            else if(e.faction==='ENEMY') { Game.enemyEntities.push(e); e.isVisible = VisionGrid.isVisible(e.pos); }
            if(e.classType) Game.activeHeroes.push(e);
            if(e.type==='SHOP') { Game.activeShops.push(e); Game.shops.push(e); }
            if(e.type.startsWith('FLAG_')) { Game.activeFlags.push(e); Game.flags.push(e); }
            if(e.type==='SPAWNER') Game.activeSpawners.push(e);

            if (e.isStatic) {
              if (updateStatic) Game.renderStatic.push(e);
            } else {
              Game.renderDynamic.push(e);
            }
          }

          if (updateStatic) {
            Game.renderStatic.sort((a, b) => a.pos.y - b.pos.y);
            Game.staticDirty = false;
          }
          Game.renderDynamic.sort((a, b) => a.pos.y - b.pos.y);

          Game.updateUI();
          for (let i = 0; i < Game.entities.length; i++)
            Game.entities[i].update(dtS);
          Game.projectiles.forEach((p) => p.update(dtS));
          for (let i = Game.projectiles.length - 1; i >= 0; i--) {
            if (!Game.projectiles[i].active) {
              Game.projectiles[i] =
                Game.projectiles[Game.projectiles.length - 1];
              Game.projectiles.pop();
            }
          }
          for (let i = Game.particles.length - 1; i >= 0; i--) {
            const p = Game.particles[i];
            p.pos.x += p.vel.x;
            p.pos.y += p.vel.y;
            p.life -= dtS;
            if (p.life <= 0) {
              Game.particles[i] = Game.particles[Game.particles.length - 1];
              Game.particles.pop();
            }
          }
          for (let i = Game.floatingTexts.length - 1; i >= 0; i--) {
            const ft = Game.floatingTexts[i];
            ft.pos.x += ft.vel.x;
            ft.pos.y += ft.vel.y;
            ft.life -= dtS;
            if (ft.life <= 0) {
              ft.el.remove();
              Game.floatingTexts[i] =
                Game.floatingTexts[Game.floatingTexts.length - 1];
              Game.floatingTexts.pop();
            }
          }
          Game.entities.forEach((e) => {
            if (e.faction === "ENEMY")
              e.isVisible = !Game.fogOfWar || Game.isPosVisible(e.pos);
          });
          accumulator -= TIME_STEP;
          updated = true;
        }
    }
    if (!updated) return; ctx.clearRect(0,0,canvas.width,canvas.height); ctx.save(); ctx.translate(canvas.width/2,canvas.height/2); ctx.scale(Camera.zoom,Camera.zoom); ctx.translate(-Camera.x,-Camera.y); 
    
    ctx.drawImage(bgCanvas, Game.bgBounds.x, Game.bgBounds.y); 
    
    if (Game.fogOfWar) {
        fogCanvas.width = canvas.width; fogCanvas.height = canvas.height;
        fogCtx.fillStyle='rgba(0,0,0,0.7)'; fogCtx.fillRect(0, 0, canvas.width, canvas.height); 
        fogCtx.globalCompositeOperation='destination-out'; 
        fogCtx.save();
        fogCtx.translate(canvas.width/2,canvas.height/2); fogCtx.scale(Camera.zoom,Camera.zoom); fogCtx.translate(-Camera.x,-Camera.y);
        for(let e of Game.playerEntities){let v=e.getVisionRange(); if(v>0)fogCtx.drawImage(getVisionImage(v),e.pos.x-v,e.pos.y-v);} 
        fogCtx.restore();
        fogCtx.globalCompositeOperation='source-over'; 
        ctx.restore();
        ctx.drawImage(fogCanvas, 0, 0);
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(Camera.zoom, Camera.zoom);
        ctx.translate(-Camera.x, -Camera.y);


        let sIdx = 0,
          dIdx = 0;
        while (
          sIdx < Game.renderStatic.length ||
          dIdx < Game.renderDynamic.length
        ) {
          let sEnt = Game.renderStatic[sIdx];
          let dEnt = Game.renderDynamic[dIdx];

          while (sEnt && sEnt.faction === "ENEMY" && !sEnt.isVisible) {
            sIdx++;
            sEnt = Game.renderStatic[sIdx];
          }
          while (dEnt && dEnt.faction === "ENEMY" && !dEnt.isVisible) {
            dIdx++;
            dEnt = Game.renderDynamic[dIdx];
          }

          if (!sEnt && !dEnt) break;

          if (sEnt && dEnt) {
            if (sEnt.pos.y <= dEnt.pos.y) {
              sEnt.draw(ctx);
              sIdx++;
            } else {
              dEnt.draw(ctx);
              dIdx++;
            }
        } else if (sEnt) {
            sEnt.draw(ctx); sIdx++;
        } else {
            dEnt.draw(ctx); dIdx++;
        }
    }

    Game.projectiles.forEach(p=>p.draw(ctx)); 
    Game.particles.forEach(p=>{if(!VisionGrid.isVisible(p.pos))return; ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.pos.x,p.pos.y,3,0,Math.PI*2); ctx.fill();});
    
    ctx.globalAlpha=1.0;
    if (Game.mode!=='NONE'){
        const bM={'BUILD_WARRIOR':'WARRIOR_GUILD','BUILD_ROGUE':'ROGUE_GUILD','BUILD_DRUID':'DRUID_GUILD','BUILD_SHOP':'SHOP','BUILD_FARM':'FARM','BUILD_TOWER':'TOWER','BUILD_TAVERN':'TAVERN'};
        if(bM[Game.mode]){
            const bt=bM[Game.mode],cnf=BUILDING_CONFIG[bt]; 
            let canP=Game.canPlaceBuilding(mousePos.x,mousePos.y,cnf.radius); 
            if(bt==='TOWER'){
                const pop = Game.getPopulation();
                if(pop.cur>=pop.max)canP=false;
            } 
            ctx.globalAlpha=canP?0.8:0.3; ctx.strokeStyle=canP?'#39ff14':'#ff0000'; ctx.lineWidth=2; ctx.beginPath(); ctx.rect(mousePos.x-cnf.radius, mousePos.y-cnf.radius, cnf.radius*2, cnf.radius*2); ctx.stroke(); if(!canP){ctx.fillStyle='rgba(255,0,0,0.15)'; ctx.fill();} ctx.font=cnf.fontSize+' Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(cnf.icon,mousePos.x,mousePos.y); if(bt==='TOWER'){ctx.save();const hY=Math.sin(Game.timeMs*0.006)*4;ctx.translate(mousePos.x,mousePos.y-20+hY);ctx.font='26px Arial';ctx.fillText('🖲️',0,0);ctx.restore();} if(bt==='TAVERN'){ctx.save();ctx.font='28px Arial';ctx.fillText('🍻',mousePos.x,mousePos.y+10);ctx.restore();} 
        }
        else if(['FLAG_EXPLORE','FLAG_ATTACK','FLAG_DEFEND','FLAG_GROUP_ATTACK'].includes(Game.mode)){
            ctx.globalAlpha=0.5;ctx.beginPath();ctx.moveTo(mousePos.x,mousePos.y);ctx.lineTo(mousePos.x,mousePos.y-30);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=(Game.mode==='FLAG_ATTACK'||Game.mode==='FLAG_GROUP_ATTACK')?'#e53e3e':(Game.mode==='FLAG_DEFEND'?'#3182ce':'#ecc94b');ctx.beginPath();ctx.moveTo(mousePos.x,mousePos.y-30);ctx.lineTo(mousePos.x+15,mousePos.y-22);ctx.lineTo(mousePos.x,mousePos.y-15);ctx.fill(); 
            if (Game.mode === 'FLAG_GROUP_ATTACK') { ctx.fillStyle='white'; ctx.font='16px Arial'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText('🍻', mousePos.x + 18, mousePos.y - 22); }
            if(Game.mode==='FLAG_DEFEND'){ctx.beginPath();ctx.arc(mousePos.x,mousePos.y,40,0,Math.PI*2);ctx.setLineDash([5,5]);ctx.strokeStyle='rgba(49,130,206,0.5)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='white';ctx.font='12px Arial';ctx.fillText("Click Building",mousePos.x+30,mousePos.y-15);}
            
            if (Game.mode === 'FLAG_GROUP_ATTACK' && Game.selectedTavernForGroupQuest) {
                ctx.globalAlpha=1.0;
                const t = Game.selectedTavernForGroupQuest;
                const bounceY = Math.sin(Game.timeMs * 0.01) * 8;
                ctx.save();
                ctx.shadowColor = 'rgba(255, 255, 255, 0.9)';
                ctx.shadowBlur = 15;
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('👇', t.pos.x, t.pos.y - t.radius - 40 + bounceY);
                ctx.restore();
            }
        } 
        ctx.globalAlpha=1.0;
    }
    ctx.restore(); 
    
    Game.floatingTexts.forEach(ft => { 
        if(!VisionGrid.isVisible(ft.pos)) {
            ft.el.style.display = 'none'; 
        } else { 
            ft.el.style.display = 'block'; 
            const screenX = (ft.pos.x - Camera.x) * Camera.zoom + canvas.width / 2;
            const screenY = (ft.pos.y - Camera.y) * Camera.zoom + canvas.height / 2;
            ft.el.style.transform = `translate3d(${screenX}px, ${screenY}px, 0) translate(-50%, -50%) scale(${Camera.zoom})`;
            ft.el.style.opacity = ft.life / ft.maxLife;
          }
        });

        Game.positionUI();
      }
      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
      window.onload = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        init();
      };
    </script>
  </body>
</html>

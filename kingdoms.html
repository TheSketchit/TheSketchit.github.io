<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign: Indirect Control Strategy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="floating-text-layer"></div>
    <div id="tooltip"></div>
    <div id="top-bar" class="panel">
        <span>🪙: <span id="gold-display" style="color: #ffcc00;">500</span></span>
        <span style="margin: 0 15px;">|</span>
        <span>🫂 <span id="pop-display">0/5</span></span>
        <span style="margin: 0 15px;">|</span>
        <span style="display: flex; align-items: center; margin-right: 15px;">
            <span style="margin-right: 5px;">Tax Rate ⚖️</span>
            <button class="tax-btn" id="btn-tax-25" onclick="Game.setTaxRate(0.25)" onmouseenter="Game.showTooltip(event, 'Tax Rate', '<span style=&quot;color:white;&quot;>Low Tax (25%)</span> <span style=&quot;color:#ffcc00; font-style:italic;&quot;>of the gold that a hero obtains from killing monsters will go directly to the Kingdom\'s treasury.</span><br><br><span style=&quot;color:#aaaaaa;&quot;>[E] Decrease Tax Rate<br>[R] Increase Tax Rate</span>', true)" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">Low Tax</button>
            <button class="tax-btn active" id="btn-tax-50" onclick="Game.setTaxRate(0.5)" onmouseenter="Game.showTooltip(event, 'Tax Rate', '<span style=&quot;color:white;&quot;>Medium Tax (50%)</span> <span style=&quot;color:#ffcc00; font-style:italic;&quot;>of the gold that a hero obtains from killing monsters will go directly to the Kingdom\'s treasury.</span><br><br><span style=&quot;color:#aaaaaa;&quot;>[E] Decrease Tax Rate<br>[R] Increase Tax Rate</span>', true)" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">Medium Tax</button>
            <button class="tax-btn" id="btn-tax-75" onclick="Game.setTaxRate(0.75)" onmouseenter="Game.showTooltip(event, 'Tax Rate', '<span style=&quot;color:white;&quot;>High Tax (75%)</span> <span style=&quot;color:#ffcc00; font-style:italic;&quot;>of the gold that a hero obtains from killing monsters will go directly to the Kingdom\'s treasury.</span><br><br><span style=&quot;color:#aaaaaa;&quot;>[E] Decrease Tax Rate<br>[R] Increase Tax Rate</span>', true)" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">High Tax</button>
        </span>
        <span id="upkeep-container" style="margin-left: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(0,0,0,0.3); border: 1px solid #5a4b31; cursor: pointer;" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
            <span id="upkeep-display" style="font-weight: bold; color: #22c55e;">Low Upkeep</span>
        </span>
        <span style="margin: 0 15px; margin-left: auto;">|</span>

        <span>
            <span id="day-text" style="color: #ffcc00; font-weight: bold; text-shadow: 0 0 3px rgba(255,204,0,0.5);">Day 1:</span>
            <span id="day-timer-display" style="background: #1a1a1a; border: 1px solid #5a4b31; padding: 2px 8px; border-radius: 4px; color: #ffffff; font-family: 'Courier New', Courier, monospace; font-weight: bold; letter-spacing: 1px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); display: inline-block; min-width: 24px; text-align: center;">60</span>
        </span>
        <button id="btn-pause" aria-label="Pause Game" onclick="Game.togglePause()" style="margin-left: 15px; background: transparent; border: none; font-size: 1.2rem; cursor: pointer; color: #f0e6d2; padding: 0;">⏸️</button>
    </div>

    <div id="pause-overlay">PAUSED</div>

    <div id="info-panel" class="panel">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
            <h3 id="info-name" style="width: 100%; display: flex; justify-content: space-between; align-items: center;">Entity Name</h3>
            <div style="display: flex;">
                <button id="btn-abandon" aria-label="Abandon Quest" class="btn" style="display:none; margin-left: 10px; padding: 2px 6px; font-size: 0.9rem;" onclick="Game.abandonQuest()" onmouseenter="Game.showTooltip(event, 'Abandon Quest [A]', 'Cancel this quest and recall the heroes.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">🛑</button>
            </div>
        </div>
        
        <div id="info-stats">
            <div id="stat-tombstone" style="font-style: italic; color: #aaaaaa; margin-bottom: 10px; line-height: 1.4; display:none;"></div>
            <div id="stat-level" class="stat-line" style="display:none; flex-direction:column; margin-bottom: 8px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:2px;">
                    <span>HP:</span> <span id="val-hp-text"></span>
                </div>
                <div style="width:100%; height:8px; background:#5a4b31; border-radius:4px; overflow:hidden;">
                    <div id="val-hp-bar" style="height:100%; background:#48bb78; width:100%; transition:width 0.2s;"></div>
                </div>
            </div>
            <div id="stat-xp" class="stat-line" style="display:none; flex-direction:column; margin-bottom: 8px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:2px;">
                    <span>XP (Level <span id="val-level"></span>):</span> <span id="val-xp-text"></span>
                </div>
                <div style="width:100%; height:8px; background:#5a4b31; border-radius:4px; overflow:hidden;">
                    <div id="val-xp-bar" style="height:100%; background:#800080; width:0%; transition:width 0.2s;"></div>
                </div>
            </div>
            <div id="stat-gold" class="stat-line" style="display:none;"><span>Personal Gold:</span> <span id="val-gold" style="color:#ffcc00"></span></div>
            <div id="stat-kills" class="stat-line" style="display:none;"><span>Kills:</span> <span id="val-kills"></span></div>
            <div id="stat-dmg" class="stat-line" style="display:none;"><span>Damage:</span> <span id="val-dmg"></span></div>
            <div id="stat-items" class="stat-line" style="display:none;"><span>Items:</span> <span id="val-items"></span></div>
            <div id="stat-skills" class="stat-line" style="display:none;"><span>Training:</span> <span id="val-skills"></span></div>
            <div id="stat-state" class="stat-line" style="display:none;"><span>State:</span> <span id="val-state"></span></div>
            <div id="stat-tower-dmg" class="stat-line" style="display:none;"><span>Damage:</span> <span id="val-tower-dmg" style="color:#ffcc00;">20 (Magic)</span></div>
        </div>
        
        <div id="shop-config" style="display:none; margin-top: 10px; border-top: 1px solid #5a4b31; padding-top: 8px;">
            <div id="shop-select-ui" style="display:none;">
                <h4 style="margin: 0 0 5px 0; color: #ffcc00; display: flex; justify-content: space-between; align-items: center;">
                    Select Item <button class="btn" style="padding: 2px 6px; font-size: 0.7rem;" onclick="Game.shopActiveSlot = null; Game.hideTooltip(); Game.updateUI(true)">Cancel</button>
                </h4>
                <div class="shop-item-grid">
                    <button id="btn-shop-POTION" class="shop-item-btn" onclick="Game.buyShopItem('POTION', 50)" onmouseenter="Game.showTooltip(event, 'Health Potion', 'Restores 50 HP when health drops below 30%')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <span class="item-icon">🧪</span><span class="item-cost">50g</span><span class="item-classes">🧌🥷🧚</span>
                    </button>
                    <button id="btn-shop-SWORD" class="shop-item-btn" onclick="Game.buyShopItem('SWORD', 100)" onmouseenter="Game.showTooltip(event, 'Sword', 'Increases attack damage by 5.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <span class="item-icon">⚔️</span><span class="item-cost">100g</span><span class="item-classes">🧌</span>
                    </button>
                    <button id="btn-shop-DAGGER" class="shop-item-btn" onclick="Game.buyShopItem('DAGGER', 75)" onmouseenter="Game.showTooltip(event, 'Dagger', 'Increases attack damage by 3. 5% chance to deal double damage.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <span class="item-icon">🗡️</span><span class="item-cost">75g</span><span class="item-classes">🥷</span>
                    </button>
                    <button id="btn-shop-WAND" class="shop-item-btn" onclick="Game.buyShopItem('WAND', 120)" onmouseenter="Game.showTooltip(event, 'Wand', 'Increases attack damage by 8 and attack range by 25%.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <span class="item-icon">🪄</span><span class="item-cost">120g</span><span class="item-classes">🧚</span>
                    </button>
                    <button id="btn-shop-ARMOR" class="shop-item-btn" onclick="Game.buyShopItem('ARMOR', 100)" onmouseenter="Game.showTooltip(event, 'Leather Armor', 'Increases max HP by 50 and reduces damage taken by 2.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <span class="item-icon">🧥</span><span class="item-cost">100g</span><span class="item-classes">🧌🥷🧚</span>
                    </button>
                    <button id="btn-shop-CHAINMAIL" class="shop-item-btn" onclick="Game.buyShopItem('CHAINMAIL', 200)" onmouseenter="Game.showTooltip(event, 'Chainmail', 'Increases max HP by 100 and reduces damage taken by 5. Replaces Leather Armor.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <span class="item-icon">⛓️</span><span class="item-cost">200g</span><span class="item-classes">🧌</span>
                    </button>
                    <button id="btn-shop-ROBE_OF_THORNS" class="shop-item-btn" onclick="Game.buyShopItem('ROBE_OF_THORNS', 200)" onmouseenter="Game.showTooltip(event, 'Robe of Thorns', 'Increases max HP by 50 and reduces damage taken by 2. Returns 20% of incoming damage to the attacker. Replaces Leather Armor.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <span class="item-icon">👘</span><span class="item-cost">200g</span><span class="item-classes">🧚</span>
                    </button>
                    <button id="btn-shop-ROGUES_DISGUISE" class="shop-item-btn" onclick="Game.buyShopItem('ROGUES_DISGUISE', 250)" onmouseenter="Game.showTooltip(event, 'Rogue\'s Disguise', 'Increases max HP by 50 and reduces damage taken by 2. Monsters ignore the wearer until attacked. Replaces Leather Armor.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <span class="item-icon">🕵️‍♂️</span><span class="item-cost">250g</span><span class="item-classes">🥷</span>
                    </button>
                </div>
            </div>
            <div id="shop-slots-ui" style="display:none;">
                <h4 style="margin: 0 0 5px 0; color: #ffcc00;">Goods for Sale</h4>
                <div class="shop-slot-row">
                    <button id="shop-slot-0" class="shop-slot-btn" onclick="Game.shopActiveSlot = 0; Game.updateUI(true)"></button>
                    <button id="shop-slot-1" class="shop-slot-btn" onclick="Game.shopActiveSlot = 1; Game.updateUI(true)"></button>
                    <button id="shop-slot-2" class="shop-slot-btn" onclick="Game.shopActiveSlot = 2; Game.updateUI(true)"></button>
                </div>
            </div>
        </div>

        <div id="guild-config" style="display:none; margin-top: 10px; border-top: 1px solid #5a4b31; padding-top: 8px;">
            <div id="guild-roster" style="margin-bottom: 4px; font-size: 0.8rem; text-align: center;"></div>
            <div id="guild-roster-icons"></div>
            <div class="panel-btn-grid" id="guild-upgrades">
                <button class="menu-btn build-btn" id="btn-recruit" onclick="Game.recruitHero()" onmouseenter="Game.showTooltip(event, 'Train Hero', 'Recruit a new hero to join this guild.<br><span style=&quot;color:#ffcc00; font-style:italic;&quot;>Requires 1 🫂 (Population)</span>')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                    <div class="build-btn-header">
                        <div class="build-btn-hotkey">T</div>
                        <div class="build-btn-title">Train</div>
                    </div>
                    <div class="build-btn-icon" id="recruit-icon">🧌</div>
                    <div class="build-btn-cost-badge"><span class="build-btn-cost" id="recruit-cost">🪙100 | 1 🫂</span></div>
                </button>
            </div>

            <div id="guild-select-ui" style="display:none; margin-top: 10px;">
                <h4 style="margin: 0 0 5px 0; color: #ffcc00; display: flex; justify-content: space-between; align-items: center;">
                    Select Training <button class="btn" style="padding: 2px 6px; font-size: 0.7rem;" onclick="Game.guildActiveSlot = null; Game.hideTooltip(); Game.updateUI(true)">Cancel</button>
                </h4>
                <div class="panel-btn-grid">
                    <button id="btn-upg-CHARGE" class="menu-btn build-btn" onclick="Game.buyGuildUpgrade('CHARGE')" style="display: none;" onmouseenter="Game.showTooltip(event, 'Charge', 'Warriors will charge at distant enemies, dealing damage and stunning them.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <div class="build-btn-header">
                            <div class="build-btn-hotkey"></div>
                            <div class="build-btn-title">Charge</div>
                        </div>
                        <div class="build-btn-icon">⚡</div>
                        <div class="build-btn-cost-badge"><span class="build-btn-cost">🪙100</span></div>
                    </button>
                    <button id="btn-upg-RAT_TRAP" class="menu-btn build-btn" onclick="Game.buyGuildUpgrade('RAT_TRAP')" style="display: none;" onmouseenter="Game.showTooltip(event, 'Rat Trap', 'Rogues will occasionally place traps when killing rats.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <div class="build-btn-header">
                            <div class="build-btn-hotkey"></div>
                            <div class="build-btn-title">Rat Trap</div>
                        </div>
                        <div class="build-btn-icon">🪤</div>
                        <div class="build-btn-cost-badge"><span class="build-btn-cost">🪙100</span></div>
                    </button>
                    <button id="btn-upg-REGROWTH" class="menu-btn build-btn" onclick="Game.buyGuildUpgrade('REGROWTH')" style="display: none;" onmouseenter="Game.showTooltip(event, 'Regrowth', 'Druids occasionally cast a powerful healing spell on heavily injured allies.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <div class="build-btn-header">
                            <div class="build-btn-hotkey"></div>
                            <div class="build-btn-title">Regrowth</div>
                        </div>
                        <div class="build-btn-icon">🌱</div>
                        <div class="build-btn-cost-badge"><span class="build-btn-cost">🪙100</span></div>
                    </button>
                    <button id="btn-upg-MARK_OF_THE_WILD" class="menu-btn build-btn" onclick="Game.buyGuildUpgrade('MARK_OF_THE_WILD')" style="display: none;" onmouseenter="Game.showTooltip(event, 'Mark of the Wild', 'Every 30 seconds, the druid casts mark of the wild on themselves and one nearby ally for 20. If they are in a group, they will cast it on all group members instead. Mark of the Wild increase health, damage, and damage resistance by 10 percent.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <div class="build-btn-header">
                            <div class="build-btn-hotkey"></div>
                            <div class="build-btn-title">Mark of the Wild</div>
                        </div>
                        <div class="build-btn-icon">🍁</div>
                        <div class="build-btn-cost-badge"><span class="build-btn-cost">🪙100</span></div>
                    </button>
                    <button id="btn-upg-CHEAP_SHOT" class="menu-btn build-btn" onclick="Game.buyGuildUpgrade('CHEAP_SHOT')" style="display: none;" onmouseenter="Game.showTooltip(event, 'Cheap Shot', 'The rogue\'s melee attack will have a 25 percent chance to stun the enemy for 3 seconds.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <div class="build-btn-header">
                            <div class="build-btn-hotkey"></div>
                            <div class="build-btn-title">Cheap Shot</div>
                        </div>
                        <div class="build-btn-icon">🤜</div>
                        <div class="build-btn-cost-badge"><span class="build-btn-cost">🪙100</span></div>
                    </button>
                    <button id="btn-upg-TAUNT" class="menu-btn build-btn" onclick="Game.buyGuildUpgrade('TAUNT')" style="display: none;" onmouseenter="Game.showTooltip(event, 'Taunt', 'The warrior shouts at the monster that they are attacking, forcing it to attack the warrior.')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                        <div class="build-btn-header">
                            <div class="build-btn-hotkey"></div>
                            <div class="build-btn-title">Taunt</div>
                        </div>
                        <div class="build-btn-icon">🤬</div>
                        <div class="build-btn-cost-badge"><span class="build-btn-cost">🪙100</span></div>
                    </button>
                </div>
            </div>
            <div id="guild-slots-ui" style="display:none; margin-top: 10px;">
                <h4 style="margin: 0 0 5px 0; color: #ffcc00;">Training Offered</h4>
                <div class="shop-slot-row">
                    <button id="guild-slot-0" class="shop-slot-btn" onclick="Game.guildActiveSlot = 0; Game.updateUI(true)"></button>
                </div>
            </div>
        </div>

        <div id="temple-config" style="display:none; margin-top: 10px; border-top: 1px solid #5a4b31; padding-top: 8px;">
            <h4 style="margin: 0 0 5px 0; color: #ffcc00; display: flex; justify-content: space-between; align-items: center;">
                Resurrect Heroes <button class="btn" style="padding: 2px 6px; font-size: 0.7rem;" onclick="Game.resurrectHighestLevelHero()" id="btn-revive-highest" title="Hotkey: R">Revive Highest [R]</button>
            </h4>
            <div id="temple-hero-grid" class="shop-item-grid scrollable-grid" style="max-height: 260px; overflow-y: auto; overflow-x: hidden;">
            </div>
        </div>
        <div id="tavern-config" style="display:none; margin-top: 10px; border-top: 1px solid #5a4b31; padding-top: 8px;">
            <div id="tavern-select-ui" style="display:none;">
                <h4 style="margin: 0 0 5px 0; color: #ffcc00; display: flex; justify-content: space-between; align-items: center;">
                    Select Heroes (2-4) <button class="btn" style="padding: 2px 6px; font-size: 0.7rem;" onclick="Game.tavernActiveSlot = null; Game.updateUI(true)">Cancel</button>
                </h4>
                <div id="tavern-hero-grid" class="shop-item-grid scrollable-grid" style="max-height: 260px; overflow-y: auto; overflow-x: hidden;">
                </div>
                <button id="btn-form-group" class="btn" style="width: 100%; margin-top: 10px; padding: 8px; font-size: 1rem;" onclick="Game.formTavernGroup()" disabled>Form Group</button>
            </div>
            <div id="tavern-slots-ui" style="display:none;">
                <h4 style="margin: 0 0 5px 0; color: #ffcc00;">Hero Groups</h4>
                <div id="tavern-groups-container" style="display: flex; flex-direction: column; gap: 8px;">
                </div>
            </div>
        </div>

        <div id="farm-config" style="display:none; margin-top: 10px; border-top: 1px solid #5a4b31; padding-top: 8px;">
            <div class="panel-btn-grid" id="farm-upgrades">
                <button id="btn-upg-farm" class="menu-btn build-btn" onclick="Game.upgradeFarm()" onmouseenter="Game.showTooltip(event, 'Upgrade Farm', 'Increases the farm\'s hitpoints and provides an additional 3 🫂.<br><span style=&quot;color:#ffcc00; font-style:italic;&quot;>Cost 125</span>')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                    <div class="build-btn-header">
                        <div class="build-btn-hotkey">U</div>
                        <div class="build-btn-title">Upgrade</div>
                    </div>
                    <div class="build-btn-icon">🏘️</div>
                    <div class="build-btn-cost-badge"><span class="build-btn-cost" id="farm-upg-cost">🪙125</span></div>
                </button>
            </div>
        </div>
        
        <div id="tower-config" style="display:none; margin-top: 10px; border-top: 1px solid #5a4b31; padding-top: 8px;">
            <div class="panel-btn-grid" id="tower-upgrades">
                <button id="btn-upg-tower" class="menu-btn build-btn" onclick="Game.upgradeTower()" onmouseenter="Game.showTooltip(event, 'Upgrade Tower', 'Increases the tower\'s hitpoints by 200 and allows it to shoot 3 targets at once.<br><span style=\'color:#ffcc00; font-style:italic;\'>Costs 400g and 1 🫂</span>')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                    <div class="build-btn-header">
                        <div class="build-btn-hotkey">U</div>
                        <div class="build-btn-title">Upgrade</div>
                    </div>
                    <div class="build-btn-icon">🚦</div>
                    <div class="build-btn-cost-badge"><span class="build-btn-cost" id="tower-upg-cost">🪙400 | 1 🫂</span></div>
                </button>
            </div>
        </div>
    </div>

    <div id="bottom-bar">
        <button class="menu-btn nav-btn" id="btn-repair-mode" onclick="setMode('REPAIR')" onmouseenter="Game.showTooltip(event, 'Repair Mode', 'Click on buildings to toggle repairing. Heals the building for 30 HP every 2 seconds.<br><span style=&quot;color:#ffcc00; font-style:italic;&quot;>Costs 10g per tick.</span>', true)" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()" style="margin-right: 15px;">
            <div class="build-btn-header"><div class="build-btn-hotkey">F</div></div>
            <div class="build-btn-icon">🔨</div>
            <div class="build-btn-cost-badge"><span class="build-btn-cost" style="color: #f0e6d2;">Repair</span></div>
        </button>
        <div id="menu-build" class="menu-group" style="display: flex;">
            <button class="menu-btn nav-btn" onclick="switchMenu('COMMAND')" onmouseenter="Game.showTooltip(event, 'Quests', '', true)" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                <div class="build-btn-header"><div class="build-btn-hotkey">Q</div></div>
                <div class="build-btn-icon">📜</div>
                <div class="build-btn-cost-badge"><span class="build-btn-cost" style="color: #f0e6d2;">Quests</span></div>
            </button>
            <button class="menu-btn build-btn" id="btn-warrior-guild" onclick="setMode('BUILD_WARRIOR')" onmouseenter="Game.showTooltip(event, 'Warrior Guild', 'Recruit up to 3 Warriors per guild hall.<br><span style=&quot;color:#ffcc00; font-style:italic;&quot;>Warriors have more health and are usually in the thick of the fighting.</span>', true, '<i>+100🪙 per 🛖</i>')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                <div class="build-btn-header"><div class="build-btn-hotkey">1</div><div class="build-btn-title">Warriors</div></div>
                <div class="build-btn-icon">🛖</div>
                <div class="build-btn-cost-badge"><span class="build-btn-cost">🪙200</span></div>
            </button>
            <button class="menu-btn build-btn" id="btn-rogue-guild" onclick="setMode('BUILD_ROGUE')" onmouseenter="Game.showTooltip(event, 'Rogue Guild', 'Recruit up to 3 Rogues per guild hall.<br><span style=&quot;color:#ffcc00; font-style:italic;&quot;>Rogues aren\'t as strong as warriors, but have other tricks up their sleeves.</span>', true, '<i>+100🪙 per 🏚️</i>')" onmousemove="Game.moveTooltip(event)" onmouseleave="Game.hideTooltip()">
                <div class="build-btn-header"><div class="build-btn-hotkey">2</div><div class="build-btn-title">Rogues</div></div>
                <div class="build-btn-icon">🏚️</div>
                <div class="build-btn-cost-badge"><span class="build-btn-cost">🪙150</span></div>
            </button>

<script src="vec2.js"></script>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const WORLD_WIDTH = 1500;
const WORLD_HEIGHT = 1000;

const Engine = {
    audioCtx: null,
    masterGain: null,
    reverbNode: null,

    initAudio() {
        if (this.audioCtx) return;
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.audioCtx.createGain();
        this.masterGain.gain.value = 0.5;
        this.masterGain.connect(this.audioCtx.destination);

        this.reverbNode = this.audioCtx.createConvolver();
        const rate = this.audioCtx.sampleRate;
        const length = rate * 2;
        const impulse = this.audioCtx.createBuffer(2, length, rate);
        const left = impulse.getChannelData(0);
        const right = impulse.getChannelData(1);
        for (let i = 0; i < length; i++) {
            const decay = Math.exp(-i / (rate * 0.5));
            left[i] = (Math.random() * 2 - 1) * decay;
            right[i] = (Math.random() * 2 - 1) * decay;
        }
        this.reverbNode.buffer = impulse;
        this.reverbNode.connect(this.masterGain);
    },

    playDoomStab(time, freq, duration) {
        if (!this.audioCtx) return;
        const audioCtx = this.audioCtx;
        const masterGain = this.masterGain;
        const reverbNode = this.reverbNode;

        const sub = audioCtx.createOscillator();
        const subGain = audioCtx.createGain();
        sub.type = 'sine';
        sub.frequency.setValueAtTime(freq, time);
        sub.frequency.exponentialRampToValueAtTime(freq * 0.9, time + 0.2);

        const saw1 = audioCtx.createOscillator();
        const saw2 = audioCtx.createOscillator();
        const squareSub = audioCtx.createOscillator();
        const sawGain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        saw1.type = 'sawtooth';
        saw2.type = 'sawtooth';
        squareSub.type = 'square';

        saw1.frequency.setValueAtTime(freq, time);
        saw2.frequency.setValueAtTime(freq * 1.02, time);
        squareSub.frequency.setValueAtTime(freq * 0.5, time);

        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1000, time);
        filter.frequency.exponentialRampToValueAtTime(60, time + 0.3);

        [subGain, sawGain].forEach(g => {
            g.gain.setValueAtTime(0, time);
            g.gain.linearRampToValueAtTime(1.0, time + 0.02);
            g.gain.exponentialRampToValueAtTime(0.01, time + duration);
        });

        sub.connect(subGain).connect(masterGain);
        saw1.connect(filter);
        saw2.connect(filter);
        squareSub.connect(filter);
        filter.connect(sawGain).connect(reverbNode);

        sub.start(time); sub.stop(time + duration);
        saw1.start(time); saw1.stop(time + duration);
        saw2.start(time); saw2.stop(time + duration);
        squareSub.start(time); squareSub.stop(time + duration);
    },

    triggerDoom() {
        this.initAudio();
        if (this.audioCtx.state === 'suspended') {
            this.audioCtx.resume();
        }
        const startT = this.audioCtx.currentTime + 0.1;
        this.playDoomStab(startT, 43.65, 0.5);
        this.playDoomStab(startT + 0.4, 38.89, 0.5);
        this.playDoomStab(startT + 0.8, 36.71, 3.5);
    }
};

const Camera = {
    x: WORLD_WIDTH / 2,
    y: WORLD_HEIGHT / 2,
    zoom: 1.0,
    targetZoom: 1.0
};

let screenMousePos = new Vec2(0, 0);
let isPanning = false;
let panStart = new Vec2(0,0);
let cameraStart = new Vec2(0,0);
let mousePos = new Vec2(0,0);
const keys = {};

window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (!Game.isPaused && !Game.gameOver) {
        const k = e.key.toLowerCase();
        if (k === 'escape') { Game.selectedEntity = null; setMode('NONE'); Game.updateUI(true); }
        if (k === 'q') switchMenu('COMMAND');
        if (k === 'b') switchMenu('BUILD');
        if (k === 'f') setMode('REPAIR');
        if (k === '\\') Game.fogOfWar = !Game.fogOfWar;

        if (k === 'e') {
            const rates = [0.25, 0.5, 0.75];
            const idx = rates.indexOf(Game.taxRate);
            if (idx > 0) Game.setTaxRate(rates[idx - 1]);
        }
        if (k === 'r') {
            const rates = [0.25, 0.5, 0.75];
            const idx = rates.indexOf(Game.taxRate);
            if (idx < rates.length - 1) Game.setTaxRate(rates[idx + 1]);
        }
        
        if (Game.selectedEntity && Game.selectedEntity.active) {
            const type = Game.selectedEntity.type;
            if (type === 'WARRIOR_GUILD' || type === 'ROGUE_GUILD' || type === 'DRUID_GUILD') {
                if (k === 't') Game.recruitHero();
                else if (k === 'r') {
                    let upg = type === 'WARRIOR_GUILD' ? 'CHARGE' : (type === 'ROGUE_GUILD' ? 'RAT_TRAP' : (type === 'DRUID_GUILD' ? 'REGROWTH' : ''));
                    if (upg) Game.researchUpgrade(upg);
                }
            } else if (type === 'FARM') {
                if (k === 'u' && !Game.selectedEntity.isUpgraded) Game.upgradeFarm();
            } else if (type === 'TOWER') {
                if (k === 'u' && !Game.selectedEntity.isUpgraded) Game.upgradeTower();
            } else if (type.startsWith('FLAG_')) {
                if (k === 'a') Game.abandonQuest();
            } else if (type === 'TEMPLE') {
                if (k === 'r') Game.resurrectHighestLevelHero();
            }
        }
        const buildMenuVisible = document.getElementById('menu-build').style.display !== 'none';
        const commandMenuVisible = document.getElementById('menu-command').style.display !== 'none';
        if (buildMenuVisible) {
            let btnId = k === '1' ? 'btn-warrior-guild' : (k === '2' ? 'btn-rogue-guild' : (k === '3' ? 'btn-druid-guild' : (k === '4' ? 'btn-shop' : (k === '5' ? 'btn-farm' : (k === '6' ? 'btn-tower' : (k === '7' ? 'btn-tavern' : (k === '8' ? 'btn-temple' : null)))))));
            if (btnId) { const btn = document.getElementById(btnId); if (btn && !btn.disabled) btn.click(); }
        } else if (commandMenuVisible) {
            let btnId = k === '1' ? 'btn-flag-explore' : (k === '2' ? 'btn-flag-defend' : (k === '3' ? 'btn-flag-attack' : (k === '4' ? 'btn-flag-group-attack' : null)));
            if (btnId) { const btn = document.getElementById(btnId); if (btn && !btn.disabled) btn.click(); }
        }
    }
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function screenToWorld(sx, sy) {
    return new Vec2((sx - canvas.width / 2) / Camera.zoom + Camera.x, (sy - canvas.height / 2) / Camera.zoom + Camera.y);
}

const GameBounds = {
    getMain() { return { x1: 150, x2: WORLD_WIDTH - 150, y1: 150, y2: WORLD_HEIGHT - 150 }; },
    getCorridor(dir) {
        const mw = WORLD_WIDTH, mh = WORLD_HEIGHT;
        const w = 400, h = 800; 
        const cx = mw/2, cy = mh/2;
        const overlap = 50;
        switch(dir) {
            case 'NORTH': return { x1: cx - w/2, x2: cx + w/2, y1: 150 - h, y2: 150 + overlap };
            case 'SOUTH': return { x1: cx - w/2, x2: cx + w/2, y1: mh - 150 - overlap, y2: mh - 150 + h };
            case 'WEST':  return { x1: 150 - h, x2: 150 + overlap, y1: cy - w/2, y2: cy + w/2 };
            case 'EAST':  return { x1: mw - 150 - overlap, x2: mw - 150 + h, y1: cy - w/2, y2: cy + w/2 };
        }
    },
    getCorridorByPos(x, y) {
        for (let dir of ['NORTH', 'SOUTH', 'EAST', 'WEST']) {
            const area = this.getCorridor(dir);
            if (x >= area.x1 && x <= area.x2 && y >= area.y1 && y <= area.y2) {
                return { dir: dir, area: area };
            }
        }
        return null;
    },
    getAllRects() {
        const rects = [this.getMain()];
        Game.corridors.forEach(c => rects.push(this.getCorridor(c.dir)));
        return rects;
    },
    clamp(x, y, radius = 0) {
        const rects = this.getAllRects();
        let insideAny = false;
        for (let r of rects) {
            if (x >= r.x1 + radius && x <= r.x2 - radius && y >= r.y1 + radius && y <= r.y2 - radius) {
                insideAny = true; break;
            }
        }
        if (insideAny) return new Vec2(x, y);

        let bestDist = Infinity;
        let bestPt = new Vec2(x, y);
        for (let r of rects) {
            const cx = Math.max(r.x1 + radius, Math.min(x, r.x2 - radius));
            const cy = Math.max(r.y1 + radius, Math.min(y, r.y2 - radius));
            const d = (x-cx)**2 + (y-cy)**2;
            if (d < bestDist) {
                bestDist = d;
                bestPt = new Vec2(cx, cy);
            }
        }
        return bestPt;
    }
};

const bgCanvas = document.createElement('canvas');
const bgCtx = bgCanvas.getContext('2d');
function generateTerrain() {
    const boundsX1 = -1000, boundsY1 = -1000, boundsX2 = WORLD_WIDTH + 1000, boundsY2 = WORLD_HEIGHT + 1000;
    bgCanvas.width = boundsX2 - boundsX1;
    bgCanvas.height = boundsY2 - boundsY1;
    
    bgCtx.setTransform(1, 0, 0, 1, 0, 0);
    bgCtx.translate(-boundsX1, -boundsY1);

    bgCtx.fillStyle = '#2b4a22';
    bgCtx.fillRect(boundsX1, boundsY1, boundsX2 - boundsX1, boundsY2 - boundsY1);
    
    bgCtx.font = '70px Arial'; bgCtx.textAlign = 'center'; bgCtx.textBaseline = 'bottom';
    const spacing = 45;
    let trees = [];
    
    const playableRects = GameBounds.getAllRects().map(r => ({
        x1: r.x1 - 30, x2: r.x2 + 30, y1: r.y1 - 30, y2: r.y2 + 30
    }));

    if (!Game.trees) {
        for (let y = boundsY1; y <= boundsY2; y += spacing) {
            for (let x = boundsX1; x <= boundsX2; x += spacing) {
                let inPlayable = false;
                for (let r of playableRects) {
                    if (x >= r.x1 && x <= r.x2 && y >= r.y1 && y <= r.y2) {
                        inPlayable = true; break;
                    }
                }
                if (!inPlayable) {
                    trees.push({ x: x + (Math.random()*30-15), y: y + (Math.random()*30-15), type: Math.random() > 0.5 ? '🌳' : '🌲' });
                }
            }
        }
        trees.sort((a,b) => a.y - b.y);
        Game.trees = trees;
    } else {
        trees = Game.trees.filter(t => {
            let inPlayable = false;
            for (let r of playableRects) {
                if (t.x >= r.x1 && t.x <= r.x2 && t.y >= r.y1 && t.y <= r.y2) {
                    inPlayable = true; break;
                }
            }
            return !inPlayable;
        });
        Game.trees = trees;
    }

    if (Game.ashPits) {
        Game.ashPits.forEach(pit => {
            const ash = SpriteCache.getAshPit(pit.radius);
            bgCtx.drawImage(ash.img, pit.x - ash.ox, pit.y - ash.oy);
        });
    }

    trees.forEach(t => {
        bgCtx.save(); bgCtx.fillStyle = 'rgba(0,0,0,0.5)'; bgCtx.translate(t.x + 20, t.y - 5); bgCtx.scale(1, 0.4); bgCtx.beginPath(); bgCtx.arc(0, 0, 25, 0, Math.PI*2); bgCtx.fill(); bgCtx.restore();
        bgCtx.fillText(t.type, t.x, t.y);
    });
    Game.bgBounds = { x: boundsX1, y: boundsY1 };
}

const SpriteCache = {
    cache: {},
    get(icon, size, drawShadow = true, stroke = true, outlineColor = null) {
        const key = `${icon}_${size}_${drawShadow}_${stroke}_${outlineColor}`;
        if (this.cache[key]) return this.cache[key];
        const c = document.createElement('canvas');
        const pad = drawShadow || outlineColor ? 15 : 5;
        c.width = size + pad * 2; c.height = size + pad * 2;
        const ctx = c.getContext('2d');
        const cx = c.width/2, cy = c.height/2;

        if (outlineColor) {
            const sil = document.createElement('canvas');
            sil.width = c.width; sil.height = c.height;
            const sCtx = sil.getContext('2d');
            sCtx.font = `${size}px Arial`; sCtx.textAlign='center'; sCtx.textBaseline='middle';
            sCtx.fillText(icon, cx, cy);
            sCtx.globalCompositeOperation = 'source-in';
            sCtx.fillStyle = outlineColor;
            sCtx.fillRect(0, 0, sil.width, sil.height);

            const offsets = [[-3,0],[3,0],[0,-3],[0,3],[-2,-2],[2,-2],[-2,2],[2,2]];
            for(let [ox, oy] of offsets) ctx.drawImage(sil, ox, oy);
        } else if (drawShadow) { 
            ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=8; ctx.shadowOffsetX=3; ctx.shadowOffsetY=5; 
        }

        ctx.font = `${size}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
        if (stroke && !outlineColor) { ctx.lineWidth=1; ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.strokeText(icon, cx, cy); }
        
        ctx.shadowColor = 'transparent';
        ctx.fillText(icon, cx, cy);
        
        this.cache[key] = { img: c, ox: cx, oy: cy };
        return this.cache[key];
    },
    getImage(src, size, drawShadow = true, stroke = true, outlineColor = null) {
        const key = `img_${src}_${size}_${drawShadow}_${stroke}_${outlineColor}`;
        if (this.cache[key] && this.cache[key].loaded) return this.cache[key];

        if (!this.cache[key]) {
            const img = new Image();
            img.src = src;

            // Create an empty canvas placeholder while it loads
            const c = document.createElement('canvas');
            const pad = drawShadow || outlineColor ? 15 : 5;
            c.width = size + pad * 2; c.height = size + pad * 2;
            const cx = c.width/2, cy = c.height/2;

            this.cache[key] = { img: c, ox: cx, oy: cy, loaded: false };

            img.onload = () => {
                const ctx = c.getContext('2d');
                ctx.clearRect(0, 0, c.width, c.height);

                if (outlineColor) {
                    const sil = document.createElement('canvas');
                    sil.width = c.width; sil.height = c.height;
                    const sCtx = sil.getContext('2d');
                    // Draw image for silhouette
                    sCtx.drawImage(img, cx - size/2, cy - size/2, size, size);
                    sCtx.globalCompositeOperation = 'source-in';
                    sCtx.fillStyle = outlineColor;
                    sCtx.fillRect(0, 0, sil.width, sil.height);

                    const offsets = [[-3,0],[3,0],[0,-3],[0,3],[-2,-2],[2,-2],[-2,2],[2,2]];
                    for(let [ox, oy] of offsets) ctx.drawImage(sil, ox, oy);
                } else if (drawShadow) {
                    ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=8; ctx.shadowOffsetX=3; ctx.shadowOffsetY=5;
                }

                if (stroke && !outlineColor) {
                    const sil2 = document.createElement('canvas');
                    sil2.width = c.width; sil2.height = c.height;
                    const sCtx2 = sil2.getContext('2d');
                    sCtx2.drawImage(img, cx - size/2, cy - size/2, size, size);
                    sCtx2.globalCompositeOperation = 'source-in';
                    sCtx2.fillStyle = 'rgba(0,0,0,0.8)';
                    sCtx2.fillRect(0, 0, sil2.width, sil2.height);

                    const strokeOffsets = [[-1,0],[1,0],[0,-1],[0,1]];
                    for(let [ox, oy] of strokeOffsets) {
                        ctx.drawImage(sil2, ox, oy);
                    }
                }

                ctx.shadowColor = 'transparent';
                ctx.drawImage(img, cx - size/2, cy - size/2, size, size);
                this.cache[key].loaded = true;
            };
        }
        return this.cache[key];
    },
    getAshPit(radius) {
        const key = 'ashpit_' + radius;
        if (this.cache[key]) return this.cache[key];
        const c = document.createElement('canvas');
        c.width = radius * 2; c.height = radius * 2;
        const ctx = c.getContext('2d');
        const cx = radius, cy = radius;
        
        ctx.fillStyle = 'rgba(60, 60, 60, 0.7)';
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI*2);
        ctx.fill();

        for(let i=0; i<25; i++) {
            const a = Math.random() * Math.PI * 2;
            const d = Math.random() * (radius * 0.85);
            const br = 4 + Math.random() * 8;
            ctx.fillStyle = 'rgba(180, 40, 40, 0.6)';
            ctx.beginPath();
            ctx.arc(cx + Math.cos(a)*d, cy + Math.sin(a)*d, br, 0, Math.PI*2);
            ctx.fill();
        }

        this.cache[key] = { img: c, ox: cx, oy: cy };
        return this.cache[key];
    }
};

const Grid = {
    cellSize: 150, offsetX: 1000, offsetY: 1000, cols: 30, rows: 25, cells: [],
    init() { for(let i=0; i<this.cols*this.rows; i++) this.cells.push([]); },
    clear() { for(let i=0; i<this.cells.length; i++) this.cells[i].length = 0; },
    insert(e) {
        if(!e.active) return;
        const cx = Math.floor((e.pos.x + this.offsetX)/this.cellSize), cy = Math.floor((e.pos.y + this.offsetY)/this.cellSize);
        if(cx>=0 && cx<this.cols && cy>=0 && cy<this.rows) this.cells[cy*this.cols+cx].push(e);
    },
    getNearby(pos, rSq, cb, faction=null) {
        const r = Math.sqrt(rSq);
        const minX = Math.max(0, Math.floor((pos.x - r + this.offsetX)/this.cellSize));
        const maxX = Math.min(this.cols-1, Math.floor((pos.x + r + this.offsetX)/this.cellSize));
        const minY = Math.max(0, Math.floor((pos.y - r + this.offsetY)/this.cellSize));
        const maxY = Math.min(this.rows-1, Math.floor((pos.y + r + this.offsetY)/this.cellSize));
        // Optimization: Allowing the callback to return strictly `true` aborts further grid searching,
        // saving redundant iterations for existence checks like visibility or aggro.
        for(let y=minY; y<=maxY; y++) {
            const off = y*this.cols;
            for(let x=minX; x<=maxX; x++) {
                const c = this.cells[off+x];
                for(let i=0; i<c.length; i++) {
                    if (c[i].active && (!faction || c[i].faction===faction)) { const dSq = pos.distSq(c[i].pos); if (dSq <= rSq) { if (cb(c[i], dSq) === true) return; } }
                }
            }
        }
    }
};

class Unit extends Entity { 
    constructor(x,y) { super(x,y); this.speed=1; this.target=null; this.attackRange=15; this.damage=5; this.attackCooldown=0; this.maxAttackCooldown=1.0; } 
    moveTowards(tp) { 
        const dx = tp.x - this.pos.x, dy = tp.y - this.pos.y, d = Math.sqrt(dx*dx + dy*dy);
        if (d <= this.speed) { this.pos.x = tp.x; this.pos.y = tp.y; return true; } 
        if (d > 0) { this.pos.x += (dx/d)*this.speed; this.pos.y += (dy/d)*this.speed; }
        return false; 
    }
    applySoftCollision() {
        let pushX = 0, pushY = 0;
        Grid.getNearby(this.pos, 400, (other, distSq) => {
            if (other === this || !other.active || !(other instanceof Unit)) return;
            const minDist = this.radius + other.radius;

            if (distSq < minDist * minDist && distSq > 0) {
                const dist = Math.sqrt(distSq);
                const overlap = minDist - dist;
                pushX += ((this.pos.x - other.pos.x) / dist) * overlap * 0.15;
                pushY += ((this.pos.y - other.pos.y) / dist) * overlap * 0.15;
            }
        });
        this.pos.x += pushX;
        this.pos.y += pushY;
    }
}

class Projectile {
    constructor(x, y, t, d, s, pT = 'MAGIC') { 
        this.pos = new Vec2(x, y); this.target = t; this.damage = d; this.source = s; 
        this.speed = pT === 'FIREBALL' ? 4 : (pT === 'ARROW' ? 8 : (pT === 'MAGIC_MISSILE' ? 6 : (pT === 'LAVA_ROCK' ? 6 : 5))); 
        this.active = true; this.projType = pT; 
    }
    update(dtSec) { 
        if (!this.target.active) { this.active = false; return; } 
        if (this.pos.distSq(this.target.pos) <= (this.speed*2)**2) { 
            this.target.takeDamage(this.damage, this.source); 
            if (this.projType === 'FIREBALL' && typeof this.target.fireTimer !== 'undefined') {
                this.target.fireTimer = 4.0;
            }
            this.active = false; 
        } 
        else { 
            const dx = this.target.pos.x - this.pos.x, dy = this.target.pos.y - this.pos.y, d = Math.sqrt(dx*dx+dy*dy);
            this.pos.x += (dx/d)*this.speed*dtSec*60; this.pos.y += (dy/d)*this.speed*dtSec*60;
            if (this.projType === 'MAGIC_MISSILE' && Game.frames % 2 === 0) Game.spawnParticle(this.pos.x, this.pos.y, '#3a2e1d');
            if (this.projType === 'FIREBALL' && Game.frames % 2 === 0) Game.spawnParticle(this.pos.x, this.pos.y, '#e53e3e'); 
        } 
    }
    draw(ctx) { 
        if (this.projType === 'MAGIC_MISSILE') { 
            ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(this.pos.x, this.pos.y, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#3a2e1d'; ctx.beginPath(); ctx.arc(this.pos.x, this.pos.y, 2.5, 0, Math.PI*2); ctx.fill();
        } else if (this.projType === 'ARROW') { 
            ctx.save(); ctx.translate(this.pos.x, this.pos.y); ctx.rotate(Math.atan2(this.target.pos.y - this.pos.y, this.target.pos.x - this.pos.x)); ctx.fillStyle = '#5c4530'; ctx.fillRect(-6, -1, 12, 2); ctx.restore(); 
        } else if (this.projType === 'FIREBALL') {
            const sp = SpriteCache.get('🔥', 24, false, false);
            ctx.drawImage(sp.img, this.pos.x - sp.ox, this.pos.y - sp.oy);
        } else if (this.projType === 'LAVA_ROCK') {
            const sp = SpriteCache.get('🔴', 16, false, false);
            ctx.drawImage(sp.img, this.pos.x - sp.ox, this.pos.y - sp.oy);
        } else { 
            ctx.fillStyle = '#5a4b31'; ctx.beginPath(); ctx.arc(this.pos.x, this.pos.y, 3, 0, Math.PI*2); ctx.fill();
        } 
    }
}

class Monster extends Unit {
    constructor(x, y, mT = 'RAT', bS = 0, nest = null) {
        super(x, y); this.type = 'MONSTER'; this.monsterType = mT; this.faction = 'ENEMY';

        const conf = MONSTER_CONFIG[mT] || MONSTER_CONFIG['RAT'];
        this.name = conf.name;
        
        const mainB = GameBounds.getMain();
        const inCorridor = (x < mainB.x1 || x > mainB.x2 || y < mainB.y1 || y > mainB.y2);
        this.inCorridor = inCorridor;
        this.repathTimer = 0;
        
        this.buffStacks = bS + (inCorridor ? 2 : 0);

        let effectiveDay = 1 + bS;
        let hpMult = 1.0;
        let dmgMult = 1.0;

        if (effectiveDay <= 10) {
            hpMult = 1.0 + (effectiveDay - 1) * 0.1;
            dmgMult = 1.0 + (effectiveDay - 1) * 0.1;
        } else {
            hpMult = 1.9 * Math.pow(1.15, effectiveDay - 10);
            dmgMult = 1.9 * Math.pow(1.12, effectiveDay - 10);
        }

        if (inCorridor) {
            hpMult *= 1.2;
            dmgMult *= 1.2;
        }

        let survivorMult = Math.pow(1.05, bS);
        hpMult *= survivorMult;
        dmgMult *= survivorMult;

        let corridorDaysOpenHp = 0;
        if (inCorridor) {
            const areaInfo = GameBounds.getCorridorByPos(x, y);
            if (areaInfo) {
                const corridor = Game.corridors.find(c => c.dir === areaInfo.dir);
                if (corridor) {
                    let daysOpen = Game.day - corridor.dayOpened + 1;
                    corridorDaysOpenHp = daysOpen * 100;
                }
            }
        }

        this.maxHp = Math.floor(conf.maxHp * hpMult) + corridorDaysOpenHp;
        this.speed = conf.speed;
        this.damage = Math.floor(conf.damage * dmgMult);
        this.radius = conf.radius * (1 + (hpMult - 1) * 0.02);

        this.hp = this.maxHp;

        let bountyMult = 1.0;
        if (!inCorridor) {
            bountyMult = Math.pow(0.3, Game.corridors.length);
        }
        this.bounty = Math.floor(conf.bounty * Math.pow(1.5, bS) * bountyMult);
        
        this.baseFontSize = Math.floor(24 * (1 + (hpMult - 1) * 0.05));
        this.cachedDefaultTarget = Game.base;
        this.nest = nest;
        this.wanderAngle = Math.random() * Math.PI * 2;
        this.hasLaunchedAttack = false;

        if (this.inCorridor) {
            this.state = 'CORRIDOR_IDLE';
            this.target = this.nest;
        } else {
            this.state = 'ATTACK_BASE';
            this.target = Game.base;
            this.hasLaunchedAttack = true;
        }

        this.isFeral = this.inCorridor || Game.day >= 15;
        if (this.isFeral) {
            this.name = 'Feral ' + this.name;
        }
    }
    takeDamage(a, s) { if (!this.active) return; if (s && s.type === 'TOWER' && MONSTER_CONFIG[this.monsterType].towerDamageTakenMult) a *= MONSTER_CONFIG[this.monsterType].towerDamageTakenMult; super.takeDamage(a, s); }
    getClosestBuilding() {
        let best = Game.base;
        let bD = Infinity;
        for (let i = 0; i < Game.playerEntities.length; i++) {
            let e = Game.playerEntities[i];
            if (BUILDING_CONFIG[e.type] && e.active) {
                let d = this.pos.distSq(e.pos);
                if (d < bD) { bD = d; best = e; }
            }
        }
        return best || Game.base;
    }
    update(dtSec) {
        if (this.stunTimer > 0) { this.stunTimer -= dtSec; return; } if (this.attackCooldown > 0) this.attackCooldown -= dtSec;
        this.repathTimer -= dtSec;
        let nD = Infinity, nT = null;

    evaluateGoals(myBase, hasHeal) {
        if (this.currentQuest && !this.currentQuest.active) { this.currentQuest=null; this.questPhase='NONE'; } if (this.currentQuest && this.questPhase!=='NONE' && this.questPhase!=='DO_QUEST') return;
        
        if (this.groupId) {
            let activeEnemyTarget = null;
            for (let i = 0; i < Game.activeHeroes.length; i++) {
                const h = Game.activeHeroes[i];
                if (h.groupId === this.groupId && h.target && h.target.active && h.target.faction === 'ENEMY') {
                    activeEnemyTarget = h.target;
                    break;
                }
            }
            if (activeEnemyTarget) {
                this.target = activeEnemyTarget;
                this.state = 'MOVE';
                return;
            }
        }
        
        let bS = -1, bT = null, isQ = false;
        Grid.getNearby(this.pos, 40000, (enemy, ds) => {
            if(!enemy.isVisible && ds > 22500) return;

            let s = 1000/Math.sqrt(ds); 
            if(this.classType==='WARRIOR') s*=2; 
            if(s>bS) { bS=s; bT=enemy; }
        }, 'ENEMY');
        if(bT) { this.target=bT; this.state='MOVE'; return; } if(this.currentQuest) return;
        if(this.hp<this.maxHp*0.6 && hasHeal) { const d=Math.sqrt(this.pos.distSq(myBase.pos)); let s=((this.maxHp-this.hp)/this.maxHp)*3000/Math.max(d,10); if(s>bS) { bS=s; bT=myBase; } }
        for(let i=0; i<Game.activeFlags.length; i++) {
            const f = Game.activeFlags[i];
            if (this.groupId && f.type !== 'FLAG_GROUP_ATTACK') continue;
            if (!this.groupId && f.type === 'FLAG_GROUP_ATTACK') continue;
            
            let totalNoGroup = 0;
            let assCount = 0;
            let betterCandidates = 0;
            const myScore = Math.sqrt(this.pos.distSq(f.pos)) / Math.max(0.01, this.hp / this.maxHp);

            for (let j = 0; j < Game.activeHeroes.length; j++) {
                const e = Game.activeHeroes[j];
                if (!e.groupId) totalNoGroup++;
                if (e.currentQuest === f) assCount++;
                else if (!e.currentQuest && !e.groupId) {
                    const eScore = Math.sqrt(e.pos.distSq(f.pos)) / Math.max(0.01, e.hp / e.maxHp);
                    if (eScore < myScore) betterCandidates++;
                }
            }

            const maxReq = f.type==='FLAG_EXPLORE' ? 1 : Math.min(3, Math.max(1, totalNoGroup));
            if(assCount >= maxReq) continue;
            if(betterCandidates >= maxReq - assCount) continue;
            
            const d=Math.sqrt(this.pos.distSq(f.pos));
            let effectiveBounty = f.bounty + (f.targetEntity && f.targetEntity.bounty ? f.targetEntity.bounty * 0.5 : 0);
            let s=(effectiveBounty/Math.max(d,10))*10*(this.hp/this.maxHp);
            if(this.hp/this.maxHp<0.4) s*=0.1;
            if(this.classType==='ROGUE') s*=3;
            if(['FLAG_ATTACK', 'FLAG_GROUP_ATTACK'].includes(f.type) && this.classType==='WARRIOR') s*=2.5;
            if(s>bS && s>0.5) { bS=s; bT=f; isQ=true; }
        }
        if(!isQ) {
            let sO = this.getDesiredShop();
            let tO = this.getDesiredTraining();

            if(sO) { 
                const d=Math.sqrt(this.pos.distSq(sO.pos)); 
                let s=500/Math.max(d,10); 
                if(this.hp<this.maxHp*0.4) s*=5; 
                // Check if sO has a potion the hero wants to bump priority over training
                let wantPotion = false;
                for(let itemId of sO.slots) {
                    if(itemId === 'POTION' && !this.items.includes('POTION') && this.personalGold >= ITEM_CONFIG['POTION'].cost) wantPotion = true;
                }
                if (wantPotion) s*=100;
                
                if(s>bS) { bS=s; bT=sO; } 
            }
            if(tO) { const d=Math.sqrt(this.pos.distSq(tO.pos)); let s=1500/Math.max(d,10); if(s>bS) { bS=s; bT=tO; } }

            if(!this.hasThingsToBuy()&&this.personalGold>0 && myBase.active) { const d=Math.sqrt(this.pos.distSq(myBase.pos)); let s=(this.personalGold/Math.max(d,10))*5; if(s>bS) { bS=s; bT=myBase; } } else if(this.hasThingsToBuy() && Game.guildBanks[this.classType]>0 && this.personalGold<300 && myBase.active) { const d=Math.sqrt(this.pos.distSq(myBase.pos)); let s=250/Math.max(d,10); if(s>bS) { bS=s; bT=myBase; } }
        }
        if(bT) { this.target=bT; this.state='MOVE'; } else { const baseP = myBase.active ? myBase.pos : Game.base.pos; this.target = new Vec2(baseP.x+(Math.random()-0.5)*200, baseP.y+(Math.random()-0.5)*200); this.state='MOVE'; }
    }
    getDesiredShop() {
        let bS = null, bSc = -1;
        for(let j=0; j<Game.activeShops.length; j++) {
            const s = Game.activeShops[j];
            let want = false; 
            let wantPotion = false;
            for(let itemId of s.slots) { 
                if (itemId === 'NONE') continue;
                const item = ITEM_CONFIG[itemId];
                if (!item || !item.classes.includes(this.classType) || this.items.includes(itemId) || this.personalGold < item.cost) continue;
                if (this.items.some(u => ITEM_CONFIG[u] && ITEM_CONFIG[u].replaces === itemId)) continue;
                want = true;
                if (itemId === 'POTION') wantPotion = true;
            }
            if(want) { 
                const d=Math.sqrt(this.pos.distSq(s.pos)); 
                let sc=500/Math.max(d,10); 
                if (wantPotion) sc *= 100;
                if(sc>bSc) { bSc=sc; bS=s; } 
            }
        }
        return bS;
    }
    getDesiredTraining() {
        const targetGuildType = this.classType === 'WARRIOR' ? 'WARRIOR_GUILD' : (this.classType === 'ROGUE' ? 'ROGUE_GUILD' : 'DRUID_GUILD');
        let bG = null, bSc = -1;
        
        for (let i = 0; i < Game.playerEntities.length; i++) {
            const g = Game.playerEntities[i];
            if (g.type === targetGuildType && g.active && g.slots) {
                let want = false;
                for (let tId of g.slots) {
                    if (tId === 'NONE') continue;
                    const t = UPGRADE_CONFIG[tId];
                    if (t && !this.skills.includes(tId) && this.personalGold >= t.cost / 2) {
                        want = true; break;
                    }
                }
                if (want) { 
                    const d = Math.sqrt(this.pos.distSq(g.pos)); 
                    let sc = 500 / Math.max(d, 10); 
                    if (sc > bSc) { bSc = sc; bG = g; } 
                }
            }
        }
        return bG;
    }

    hasThingsToBuy() {
        for(let j=0; j<Game.activeShops.length; j++) {
            const s = Game.activeShops[j];
            for(let itemId of s.slots) {
                if (itemId === 'NONE') continue;
                const item = ITEM_CONFIG[itemId];
                if (!item || !item.classes.includes(this.classType) || this.items.includes(itemId)) continue;
                if (this.items.some(u => ITEM_CONFIG[u] && ITEM_CONFIG[u].replaces === itemId)) continue;
                return true;
            }
        }
        const targetGuildType = this.classType === 'WARRIOR' ? 'WARRIOR_GUILD' : (this.classType === 'ROGUE' ? 'ROGUE_GUILD' : 'DRUID_GUILD');
        for (let i = 0; i < Game.playerEntities.length; i++) {
            const g = Game.playerEntities[i];
            if (g.type === targetGuildType && g.active && g.slots) {
                for (let tId of g.slots) {
                    if (tId === 'NONE') continue;
                    const t = UPGRADE_CONFIG[tId];
                    if (t && !this.skills.includes(tId)) {
                        return true;
                    }
                }
            }
        }
        return false;
    }
    buyFromShop(s) {
        for(let itemId of s.slots) {
            if (itemId === 'NONE') continue;
            const item = ITEM_CONFIG[itemId];
            if (!item || !item.classes.includes(this.classType) || this.items.includes(itemId) || this.personalGold < item.cost) continue;
            if (this.items.some(u => ITEM_CONFIG[u] && ITEM_CONFIG[u].replaces === itemId)) continue;
            
            this.personalGold -= item.cost; 
            Game.gold += Math.floor(item.cost * Game.getUpkeepInfo().rate); Game.itemsPurchased++;
            
            if (item.replaces && this.items.includes(item.replaces)) {
                this.items.splice(this.items.indexOf(item.replaces), 1);
                const oldItem = ITEM_CONFIG[item.replaces];
                if (oldItem.statBonus) {
                    if (oldItem.statBonus.maxHp) { this.maxHp -= oldItem.statBonus.maxHp; this.hp -= oldItem.statBonus.maxHp; }
                    if (oldItem.statBonus.damage) this.damage -= oldItem.statBonus.damage;
                    if (oldItem.statBonus.damageReduction) this.damageReduction -= oldItem.statBonus.damageReduction;
                    if (oldItem.statBonus.thornsPercent) this.thornsPercent -= oldItem.statBonus.thornsPercent;
                    if (oldItem.statBonus.stealth) this.stealth = false;
                    if (oldItem.statBonus.critChance) this.critChance -= oldItem.statBonus.critChance;
                    if (oldItem.statBonus.critMult) this.critMult = 1.0;
                }
            }
            
            this.items.push(itemId); 
            
            if (item.statBonus) {
                if (item.statBonus.maxHp) { this.maxHp += item.statBonus.maxHp; this.hp += item.statBonus.hp || item.statBonus.maxHp; }
                if (item.statBonus.damage) this.damage += item.statBonus.damage;
                if (item.statBonus.attackRange) this.attackRange += item.statBonus.attackRange;
                if (item.statBonus.damageReduction) this.damageReduction += item.statBonus.damageReduction;
                if (item.statBonus.thornsPercent) this.thornsPercent += item.statBonus.thornsPercent;
                if (item.statBonus.stealth) this.stealth = item.statBonus.stealth;
                if (item.statBonus.critChance) this.critChance += item.statBonus.critChance;
                if (item.statBonus.critMult) this.critMult = item.statBonus.critMult;
            }
            
            Game.spawnParticle(this.pos.x, this.pos.y, item.color || '#f0e6d2');
            this.purchasedItemVfxTimer = 2.0;
            this.purchasedItemIcon = item.icon;
            Game.spawnFloatingText(s.pos.x, s.pos.y - 30, '🪙', '#ffcc00', 1.0, 22);
            break;
        }
    }
    buyTraining(g) {
        if (!g.slots) return;
        for (let tId of g.slots) {
            if (tId === 'NONE') continue;
            const t = UPGRADE_CONFIG[tId];
            if (t && !this.skills.includes(tId) && this.personalGold >= t.cost / 2) {
                this.personalGold -= t.cost / 2;
                this.skills.push(tId);

                Game.spawnParticle(this.pos.x, this.pos.y, '#ffcc00');
                this.purchasedItemVfxTimer = 2.0;
                this.purchasedItemIcon = '🎓'; // or any suitable icon
                Game.spawnFloatingText(g.pos.x, g.pos.y - 30, '🪙', '#e53e3e', 1.0, 22); // red to signify sunk cost
                break;
            }
        }
    }

                    }
                    while (ass.length < maxReq && av.length > 0) { 
                        let h = av.shift(); h.currentQuest = this; h.questPhase = (h.target && h.target.faction==='ENEMY')?'FINISH_COMBAT':'HEAL_AT_BASE'; ass.push(h);

            } else if (this.type === 'FLAG_ATTACK') {

                        const tp = this.targetEntity ? this.targetEntity.pos : this.pos;

                            this.active = false; Game.questsCompleted++;

            }

class Spawner extends Entity {
    constructor(x, y, t = 'RAT_HOLE') {
        super(x, y); this.isStatic = true; this.spawnerType = t; this.faction = 'ENEMY'; this.type = 'SPAWNER';

        const conf = SPAWNER_CONFIG[t] || SPAWNER_CONFIG['RAT_HOLE'];
        this.name = conf.name;

        this.maxHp = conf.maxHp;
        
        const mainB = GameBounds.getMain();
        this.inCorridor = (x < mainB.x1 || x > mainB.x2 || y < mainB.y1 || y > mainB.y2);

        if (this.inCorridor) { 
            this.maxHp = Math.floor(this.maxHp * 1.2);
        }

        let bountyMult = 1.0;
        if (!this.inCorridor) {
            bountyMult = Math.pow(0.3, Game.corridors.length);
        }

        this.bounty = Math.floor((this.maxHp / 3) * bountyMult);
        this.hp = this.maxHp;
        this.daysSurvived = 0;
        
        this.baseRadius = conf.baseRadius;
        this.radius = this.baseRadius;
        this.spawnRate = conf.spawnRate;
        this.spawnTimer = Math.random() * this.spawnRate;
    }
    update(dtSec) { 
        const inBlackout = Game.dayTimer <= GAME_CONFIG.blackoutTimeSec;
        if (!inBlackout) {
            this.spawnTimer += dtSec; 
            const currentSpawnRate = this.spawnRate + (this.daysSurvived * 6.0);
            if (this.spawnTimer >= currentSpawnRate) {
                this.spawnTimer = 0; 
                const spawnCount = this.inCorridor ? 1 : 1 + Math.floor(Math.random() * (this.daysSurvived + 1));
                for (let i = 0; i < spawnCount; i++) {
                    const mx = this.pos.x + (Math.random() - 0.5) * 10;
                    const my = this.pos.y + (Math.random() - 0.5) * 10;
                    Game.addEntity(new Monster(mx, my, this.spawnerType==='WEB'?'SPIDER':(this.spawnerType==='SNAKE_NEST'?'SNAKE':'RAT'), this.daysSurvived, this));
                }
            } 
        }
    }
    die() {
        if (!this.active) return; super.die(); Game.spawnersKilled++;
        
        const validAttackers = [];
        this.attackers.forEach(a => { if (a.active) validAttackers.push(a); });
        
        if (validAttackers.length > 0) {
            const gY = this.bounty;
            const tA = Math.floor(gY * Game.taxRate);
            const hA = gY - tA;
            Game.gold += tA; Game.totalTaxCollected += tA;
            
            const sharedGold = Math.floor(hA / validAttackers.length);
            const sharedXpBase = Math.floor(this.bounty / validAttackers.length) || 1;

            validAttackers.forEach(hero => {
                const xpGain = Math.floor(sharedXpBase * (hero.currentQuest ? 1.2 : 1.0));
                hero.gainXp(xpGain);
                hero.personalGold += sharedGold;
                hero.lifetimeGold += sharedGold;
            });

            for (let i = 0; i < Game.activeFlags.length; i++) {
                const f = Game.activeFlags[i];
                if (['FLAG_ATTACK', 'FLAG_GROUP_ATTACK'].includes(f.type) && f.targetEntity === this) {
                    const bountyShare = Math.floor(f.bounty / validAttackers.length);
                    for (let j = 0; j < validAttackers.length; j++) {
                        validAttackers[j].personalGold += bountyShare;
                        validAttackers[j].lifetimeGold += bountyShare;
                    }
                    f.active = false;
                }
            }
        }
        for(let i=0;i<2;i++) Game.spawnParticle(this.pos.x, this.pos.y, '#ffcc00');
    }
    draw(ctx) {
        const scale = this.radius / this.baseRadius; ctx.save(); ctx.fillStyle = '#3e2723'; ctx.beginPath(); ctx.ellipse(this.pos.x, this.pos.y+(15*scale), 25*scale, 10*scale, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
        const conf = SPAWNER_CONFIG[this.spawnerType] || SPAWNER_CONFIG['RAT_HOLE'];
        const ic = conf.icon;
        
        const outC = Game.selectedEntity === this ? '#ffcc00' : (Game.hoveredEntity === this ? '#90ee90' : null);
        const sp = SpriteCache.get(ic, 40+(this.daysSurvived*4), true, true, outC); 
        ctx.drawImage(sp.img, this.pos.x - sp.ox, this.pos.y - sp.oy);
        this.drawHP(ctx, -25-(this.daysSurvived*2));
    }
}

            if (BUILDING_CONFIG[e.type] && e.pos.x >= area.x1 && e.pos.x <= area.x2 && e.pos.y >= area.y1 && e.pos.y <= area.y2) {
                targets.push(e);
            }
        }
        if (targets.length > 0) {
            const hitCount = Math.max(3, targets.length);
            for (let i = 0; i < hitCount; i++) {
                const target = targets[i % targets.length];
                const dmg = Math.floor(target.maxHp * 0.25);
                Game.projectiles.push(new Projectile(this.pos.x + (Math.random()-0.5)*40, this.pos.y - 40 + (Math.random()-0.5)*40, target, dmg, this, 'FIREBALL'));
            }
            Game.spawnFloatingText(this.pos.x, this.pos.y - 60, "ERUPTION!", "#e53e3e", 2.0, 24);
        }
    }
    update(dtSec) {
        if (this.stunTimer > 0) { this.stunTimer -= dtSec; return; }
        this.attackTimer -= dtSec;
        if (this.attackTimer <= 0) {
            this.attackTimer = 40.0;
            let targets = [];
            for (let i = 0; i < Game.playerEntities.length; i++) {
                if (BUILDING_CONFIG[Game.playerEntities[i].type]) targets.push(Game.playerEntities[i]);
            }
            if (targets.length > 0) {
                targets.sort(() => Math.random() - 0.5);
                const hitCount = 3;
                const dmg = 40; 
                for (let i = 0; i < hitCount; i++) {
                    const target = targets[i % targets.length];
                    Game.projectiles.push(new Projectile(this.pos.x + (Math.random()-0.5)*40, this.pos.y - 40 + (Math.random()-0.5)*40, target, dmg, this, 'FIREBALL'));
                }
                Game.spawnFloatingText(this.pos.x, this.pos.y - 60, "ERUPTION!", "#e53e3e", 2.0, 24);
            }
        }
        
        this.towerAttackTimer -= dtSec;
        if (this.towerAttackTimer <= 0) {
            this.towerAttackTimer = 1.5;
            let possibleTargets = [];
            let backupTargets = [];
            const arSq = this.attackRange ** 2;
            Grid.getNearby(this.pos, arSq, (h, distSq) => {
                if (h.classType && !h.isDead && h.state !== 'FLEE') {
                    backupTargets.push(h);
                    if (h !== this.lastTowerTarget) possibleTargets.push(h);
                }
            }, 'PLAYER');
            if (possibleTargets.length === 0) possibleTargets = backupTargets;
            
            if (possibleTargets.length > 0) {
                const target = possibleTargets[Math.floor(Math.random() * possibleTargets.length)];
                this.lastTowerTarget = target;
                Game.projectiles.push(new Projectile(this.pos.x, this.pos.y - 40, target, this.towerDamage, this, 'LAVA_ROCK'));
            }
        }
    }
    die() {
        if (!this.active) return; super.die(); Game.spawnersKilled++;
        
        const areaInfo = GameBounds.getCorridorByPos(this.pos.x, this.pos.y);
        if (areaInfo) {
            const corridor = Game.corridors.find(c => c.dir === areaInfo.dir);
            if (corridor) corridor.volcanoDestroyed = true;
        }

        if (Game.corridors.length === 4 && Game.corridors.every(c => c.volcanoDestroyed)) {
            Game.winGame();
        }

        const validAttackers = [];
        this.attackers.forEach(a => { if (a.active) validAttackers.push(a); });
        
        if (validAttackers.length > 0) {
            const gY = this.bounty;
            const tA = Math.floor(gY * Game.taxRate); const hA = gY - tA; Game.gold += tA; Game.totalTaxCollected += tA;
            const sharedGold = Math.floor(hA / validAttackers.length);
            const sharedXpBase = Math.floor(this.bounty / validAttackers.length) || 1;
            validAttackers.forEach(hero => {
                hero.kills++; hero.gainXp(Math.floor(sharedXpBase * (hero.currentQuest ? 1.2 : 1.0)));
                hero.personalGold += sharedGold; hero.lifetimeGold += sharedGold;
            });
            for (let i = 0; i < Game.activeFlags.length; i++) {
                const f = Game.activeFlags[i];
                if (['FLAG_ATTACK', 'FLAG_GROUP_ATTACK'].includes(f.type) && f.targetEntity === this) {
                    const bountyShare = Math.floor(f.bounty / validAttackers.length);
                    for (let j = 0; j < validAttackers.length; j++) {
                        validAttackers[j].personalGold += bountyShare;
                        validAttackers[j].lifetimeGold += bountyShare;
                    }
                    f.active = false;
                }
            }
        }
        for(let i=0;i<10;i++) Game.spawnParticle(this.pos.x, this.pos.y, '#e53e3e');
        for(let i=0;i<10;i++) Game.spawnParticle(this.pos.x, this.pos.y, '#ffcc00');
        Game.ashPits.push({ x: this.pos.x, y: this.pos.y, radius: this.ashRadius });
        generateTerrain();
    }
    draw(ctx) {
        const ash = SpriteCache.getAshPit(this.ashRadius);
        ctx.drawImage(ash.img, this.pos.x - ash.ox, this.pos.y - ash.oy);

        ctx.save(); ctx.fillStyle = '#3e2723'; ctx.beginPath(); ctx.ellipse(this.pos.x, this.pos.y+20, 50, 15, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
        
        const outC = Game.selectedEntity === this ? '#ffcc00' : (Game.hoveredEntity === this ? '#90ee90' : null);
        const sp = SpriteCache.get('🗻', 80, true, true, outC); 
        ctx.drawImage(sp.img, this.pos.x - sp.ox, this.pos.y - sp.oy);
        
        ctx.fillStyle = '#e53e3e'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
        ctx.fillText(Math.ceil(this.attackTimer) + "s", this.pos.x, this.pos.y - 60);
        this.drawHP(ctx, -40);
    }
}

    canPlaceBuilding(x, y, radius) {
        const clamped = GameBounds.clamp(x, y, radius);
        if (clamped.x !== x || clamped.y !== y) return false;
        
        const pos = new Vec2(x, y);
        for (let i = 0; i < this.playerEntities.length; i++) {
            const e = this.playerEntities[i];
            if (BUILDING_CONFIG[e.type]) {
                const minDistance = radius + e.radius + 15;
                if (pos.distSq(e.pos) < minDistance * minDistance) return false;
            }
        }
        for (let i = 0; i < this.activeSpawners.length; i++) {
            const e = this.activeSpawners[i];
            if (e.spawnerType === 'VOLCANO') {
                const minDistance = radius + e.ashRadius;
                if (pos.distSq(e.pos) < minDistance * minDistance) return false;
            }
        }
        return true;
    },
    spawnHole(t = 'RAT_HOLE', forceCorridor = false, specificCorridor = null) {
        const margin = t === 'SNAKE_NEST' ? 160 : 190; 
        let sx, sy, valid = false, attempts = 0, r = t === 'SNAKE_NEST' ? 15 : 20;
        
        while (!valid && attempts < 200) {
            if (forceCorridor && Game.corridors.length > 0) {
                const c = specificCorridor || Game.corridors[Math.floor(Math.random() * Game.corridors.length)].dir;
                const area = GameBounds.getCorridor(c);
                const m = 40; 
                sx = area.x1 + m + Math.random() * (area.x2 - area.x1 - m * 2);
                sy = area.y1 + m + Math.random() * (area.y2 - area.y1 - m * 2);
            } else {
                if (Math.random() > 0.5) { sx = Math.random() > 0.5 ? margin : WORLD_WIDTH - margin; sy = margin + Math.random() * (WORLD_HEIGHT - margin * 2); }
                else { sx = margin + Math.random() * (WORLD_WIDTH - margin * 2); sy = Math.random() > 0.5 ? margin : WORLD_HEIGHT - margin; }
            }
            
            valid = true; 
            const tp = new Vec2(sx, sy);
            const clearance = forceCorridor ? -10 : 15; 
            
            for (let i = 0; i < this.entities.length; i++) { 
                const e = this.entities[i]; 
                if (e.type === 'SPAWNER' || BUILDING_CONFIG[e.type]) { 
                    let requiredDist = r + e.radius + clearance;
                    if (forceCorridor && attempts > 100) {
                        requiredDist = r + e.radius - 20;
                        if (attempts > 150 && e.type === 'SPAWNER') continue; // heavily overlap spawners if stuck
                    }
                    if (tp.distSq(e.pos) < requiredDist * requiredDist) {
                        valid = false; break; 
                    } 
                } 
            }
            attempts++;
        }
        if (valid) this.addEntity(new Spawner(sx, sy, t));
    },
    spawnVolcano(dir) {
        const area = GameBounds.getCorridor(dir);
        let x, y;
        const m = 50; 
        if (dir === 'NORTH') { x = (area.x1 + area.x2)/2; y = area.y1 + m; }
        if (dir === 'SOUTH') { x = (area.x1 + area.x2)/2; y = area.y2 - m; }
        if (dir === 'WEST') { x = area.x1 + m; y = (area.y1 + area.y2)/2; }
        if (dir === 'EAST') { x = area.x2 - m; y = (area.y1 + area.y2)/2; }
        const v = new Volcano(x, y);
        this.addEntity(v);
        v.dailyEruption();
    },

    moveTooltip(e) {

            else if (y - off - h > 0 && x + off + w < window.innerWidth) { x += off; y -= off + h; }

    sortStats(col) {

    showStatsScreen(isGameOver) {
        if (!this.statsSort) this.statsSort = { column: 'level', desc: true };

        const hall = [...this.hallOfFame, ...this.playerEntities.filter(e => e.classType).map(h => ({ name: h.name, classType: h.classType, level: h.level, kills: h.kills, gold: h.lifetimeGold, revives: h.timesRevived || 0, damageDealt: h.damageDealt || 0 }))];
        hall.sort((a,b) => {
            let valA, valB;
            switch(this.statsSort.column) {
                case 'name': valA = a.name; valB = b.name; break;
                case 'classType': valA = a.classType; valB = b.classType; break;
                case 'kills': valA = a.kills; valB = b.kills; break;
                case 'gold': valA = a.gold; valB = b.gold; break;
                case 'revives': valA = a.revives; valB = b.revives; break;
                case 'damageDealt': valA = a.damageDealt; valB = b.damageDealt; break;
                case 'level': default: valA = a.level; valB = b.level; break;
            }
            if (typeof valA === 'string') {
                return this.statsSort.desc ? valB.localeCompare(valA) : valA.localeCompare(valB);
            }
            return this.statsSort.desc ? valB - valA : valA - valB;
        });
        const top10 = hall.slice(0, 10);
        
        let titleText = "GAME STATS";
        let themeColor = "#1e3a8a";
        if (isGameOver) {
            if (this.gameWon) {

                themeColor = "#e53e3e";
            }
        }
        
        const btnText = isGameOver ? "Rebuild Kingdom" : "Resume Game";
        const btnAction = isGameOver ? "location.reload()" : "Game.togglePause()";

        const th = (col, text) => {
            const isSorted = this.statsSort.column === col;
            const arrow = isSorted ? (this.statsSort.desc ? ' ▼' : ' ▲') : '';
            return `<th style="cursor:pointer; user-select:none;" onclick="Game.sortStats('${col}')">${text}${arrow}</th>`;

                if(pop.cur>=pop.max)canP=false;
            } 
            ctx.globalAlpha=canP?0.8:0.3; ctx.strokeStyle=canP?'#39ff14':'#ff0000'; ctx.lineWidth=2; ctx.beginPath(); ctx.rect(mousePos.x-cnf.radius, mousePos.y-cnf.radius, cnf.radius*2, cnf.radius*2); ctx.stroke(); if(!canP){ctx.fillStyle='rgba(255,0,0,0.15)'; ctx.fill();} ctx.font=cnf.fontSize+' Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(cnf.icon,mousePos.x,mousePos.y); if(bt==='TOWER'){ctx.save();const hY=Math.sin(Game.timeMs*0.006)*4;ctx.translate(mousePos.x,mousePos.y-20+hY);ctx.font='26px Arial';ctx.fillText('🖲️',0,0);ctx.restore();} if(bt==='TAVERN'){ctx.save();ctx.font='28px Arial';ctx.fillText('🍻',mousePos.x,mousePos.y+10);ctx.restore();} 
        }
        else if(['FLAG_EXPLORE','FLAG_ATTACK','FLAG_DEFEND','FLAG_GROUP_ATTACK'].includes(Game.mode)){
            ctx.globalAlpha=0.5;ctx.beginPath();ctx.moveTo(mousePos.x,mousePos.y);ctx.lineTo(mousePos.x,mousePos.y-30);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=(Game.mode==='FLAG_ATTACK'||Game.mode==='FLAG_GROUP_ATTACK')?'#e53e3e':(Game.mode==='FLAG_DEFEND'?'#1e3a8a':'#ffcc00');ctx.beginPath();ctx.moveTo(mousePos.x,mousePos.y-30);ctx.lineTo(mousePos.x+15,mousePos.y-22);ctx.lineTo(mousePos.x,mousePos.y-15);ctx.fill();
            if (Game.mode === 'FLAG_GROUP_ATTACK') { ctx.fillStyle='white'; ctx.font='16px Arial'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText('🍻', mousePos.x + 18, mousePos.y - 22); }
            if(Game.mode==='FLAG_DEFEND'){ctx.beginPath();ctx.arc(mousePos.x,mousePos.y,40,0,Math.PI*2);ctx.setLineDash([5,5]);ctx.strokeStyle='rgba(49,130,206,0.5)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='white';ctx.font='12px Arial';ctx.fillText("Click Building",mousePos.x+30,mousePos.y-15);}
            
            if (Game.mode === 'FLAG_GROUP_ATTACK' && Game.selectedTavernForGroupQuest) {
                ctx.globalAlpha=1.0;
                const t = Game.selectedTavernForGroupQuest;
                const bounceY = Math.sin(Game.timeMs * 0.01) * 8;
                ctx.save();
                ctx.shadowColor = 'rgba(255, 255, 255, 0.9)';
                ctx.shadowBlur = 15;
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('👇', t.pos.x, t.pos.y - t.radius - 40 + bounceY);
                ctx.restore();
            }
        } 
        ctx.globalAlpha=1.0;
    }
    ctx.restore(); 
    
    Game.floatingTexts.forEach(ft => { 
        if(!Game.isPosVisible(ft.pos)) { 
            ft.el.style.display = 'none'; 
        } else { 
            ft.el.style.display = 'block'; 
            const screenX = (ft.pos.x - Camera.x) * Camera.zoom + canvas.width / 2;
            const screenY = (ft.pos.y - Camera.y) * Camera.zoom + canvas.height / 2;
            ft.el.style.transform = `translate3d(${screenX}px, ${screenY}px, 0) translate(-50%, -50%) scale(${Camera.zoom})`;
            ft.el.style.opacity = ft.life / ft.maxLife;
        } 
    });

    Game.positionUI();
}
window.addEventListener('resize', () => { canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
window.onload = () => { canvas.width=window.innerWidth; canvas.height=window.innerHeight; init(); };
</script>
